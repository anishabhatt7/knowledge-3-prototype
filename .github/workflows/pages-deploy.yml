name: Pages Deploy

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
      - prototype/**
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: salesforce-ux-emu-Ubuntu
    steps:
      - name: Checkout source
        id: checkout-source
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: source-code

      - name: Configure authenticated git remote
        working-directory: source-code
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source-code/package-lock.json

      - name: Install dependencies
        working-directory: source-code
        run: npm ci

      - name: Build site
        working-directory: source-code
        run: npm run build

      - name: Compute deploy target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._/-]+#-#g; s#/#-#g; s#-+#-#g; s#(^-|-$)##g'
          }

          target_path=""
          target_label="production"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            target_path="previews/pr-${PR_NUMBER}"
            target_label="pr-${PR_NUMBER}"
          elif [[ "$REF_NAME" == "$DEFAULT_BRANCH" ]]; then
            target_path=""
            target_label="production"
          else
            branch_slug="$(slugify "$REF_NAME")"
            target_path="previews/${branch_slug}"
            target_label="branch-${branch_slug}"
          fi

          echo "path=${target_path}" >> "$GITHUB_OUTPUT"
          echo "label=${target_label}" >> "$GITHUB_OUTPUT"

      - name: Check for gh-pages branch
        id: pages-branch
        working-directory: source-code
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages branch
        if: steps.pages-branch.outputs.exists == 'true'
        id: checkout-pages
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: gh-pages
          path: .existing-pages
          fetch-depth: 0

      - name: Build Pages content tree
        env:
          TARGET_PATH: ${{ steps.target.outputs.path }}
          PAGES_BRANCH_EXISTS: ${{ steps.pages-branch.outputs.exists }}
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob extglob

          mkdir -p .pages-site

          if [[ "$PAGES_BRANCH_EXISTS" == "true" ]]; then
            cp -R .existing-pages/. .pages-site/
            rm -rf .pages-site/.git
          fi

          if [[ -z "$TARGET_PATH" ]]; then
            rm -rf .pages-site/!(previews)
            cp -R source-code/dist/. .pages-site/
          else
            mkdir -p ".pages-site/${TARGET_PATH}"
            rm -rf ".pages-site/${TARGET_PATH}/"*
            cp -R source-code/dist/. ".pages-site/${TARGET_PATH}/"
          fi

          touch .pages-site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add run summary
        env:
          TARGET_PATH: ${{ steps.target.outputs.path }}
        run: |
          set -euo pipefail

          base_url="${{ steps.deployment.outputs.page_url }}"
          if [[ -z "$base_url" ]]; then
            base_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          fi

          if [[ -z "$TARGET_PATH" ]]; then
            target_url="${base_url}"
          else
            target_url="${base_url%/}/${TARGET_PATH}/"
          fi

          {
            echo "### Pages deployment"
            echo ""
            echo "- Target: \`${TARGET_PATH:-/}\`"
            echo "- URL: ${target_url}"
          } >> "$GITHUB_STEP_SUMMARY"
