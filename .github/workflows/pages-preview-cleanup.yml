name: Pages Preview Cleanup

on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name to cleanup (for manual runs)
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-cleanup-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: salesforce-ux-emu-Ubuntu
    steps:
      - name: Resolve branch name
        id: branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.event.ref_type }}
          REF_NAME: ${{ github.event.ref }}
          INPUT_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          branch_name=""

          if [[ "$EVENT_NAME" == "delete" && "$REF_TYPE" == "branch" ]]; then
            branch_name="$REF_NAME"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            branch_name="$INPUT_BRANCH"
          fi

          echo "name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Compute preview path
        id: preview
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail

          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._/-]+#-#g; s#/#-#g; s#-+#-#g; s#(^-|-$)##g'
          }

          preview_path=""
          should_cleanup="false"

          if [[ "$BRANCH_NAME" == feature/* || "$BRANCH_NAME" == fix/* || "$BRANCH_NAME" == prototype/* ]]; then
            preview_path="previews/$(slugify "$BRANCH_NAME")"
            should_cleanup="true"
          fi

          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "enabled=$should_cleanup" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        if: steps.preview.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure authenticated git remote
        if: steps.preview.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Check for gh-pages branch
        if: steps.preview.outputs.enabled == 'true'
        id: pages-branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages branch
        if: steps.preview.outputs.enabled == 'true' && steps.pages-branch.outputs.exists == 'true'
        id: checkout-pages
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: gh-pages
          path: .existing-pages
          fetch-depth: 0

      - name: Rebuild Pages tree without deleted preview
        if: steps.preview.outputs.enabled == 'true'
        env:
          PREVIEW_PATH: ${{ steps.preview.outputs.path }}
          PAGES_BRANCH_EXISTS: ${{ steps.pages-branch.outputs.exists }}
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob

          mkdir -p .pages-site

          if [[ "$PAGES_BRANCH_EXISTS" == "true" ]]; then
            cp -R .existing-pages/. .pages-site/
            rm -rf .pages-site/.git
          fi

          if [[ -d ".pages-site/${PREVIEW_PATH}" ]]; then
            rm -rf ".pages-site/${PREVIEW_PATH}"
          fi

          touch .pages-site/.nojekyll

      - name: Configure Pages
        if: steps.preview.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.preview.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy cleaned Pages tree
        if: steps.preview.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add run summary
        env:
          ENABLED: ${{ steps.preview.outputs.enabled }}
          PREVIEW_PATH: ${{ steps.preview.outputs.path }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail

          if [[ "$ENABLED" != "true" ]]; then
            {
              echo "### Pages preview cleanup"
              echo ""
              echo "- Skipped cleanup for branch: \`${BRANCH_NAME}\`"
              echo "- Allowed prefixes: \`feature/*\`, \`fix/*\`, \`prototype/*\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Pages preview cleanup"
            echo ""
            echo "- Removed preview path: \`${PREVIEW_PATH}\`"
            echo "- Source branch: \`${BRANCH_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
