<template lwc:render-mode="light">
    <button type="button" class={animationToggleClass} onclick={handleAnimationToggle} title={animationToggleLabel}>
        <span class="ra-anim-toggle__track">
            <span class="ra-anim-toggle__thumb"></span>
        </span>
    </button>
    <div class={shellClass}>
        <template lwc:if={showAssistPanel}>
            <div class={assistPanelClass}>
                <ui-knowledge-assist
                    health={health}
                    suggests={suggests}
                    knowledge-blocks={knowledgeBlockLibrary}
                    inserted-block-ids={insertedBlockIds}
                    toc-tree={knowledgeToc}
                    current-article-id={article.id}
                    collapsed={isAssistCollapsed}
                    expanded={isAssistExpanded}
                    onclose={handleAssistClose}
                    onexpand={handleAssistExpand}
                    ontogglewidth={handleAssistToggleWidth}
                    onupdateall={handleUpdateAll}
                    onapplysuggestion={handleApplySuggestion}
                    oninsertblock={handleInsertBlock}>
                </ui-knowledge-assist>
            </div>
        </template>
        <template lwc:else>
            <button type="button" class="ra-reopen ra-reopen_left" onclick={handleAssistOpen}>
                <lightning-icon icon-name="utility:einstein" size="xx-small"></lightning-icon>
                <span>Knowledge Assist</span>
            </button>
        </template>

        <main class={mainClass}>
            <div class="ra-article">
                <header class="ra-article__head">
                    <div class="ra-article__title-row">
                        <div class="ra-article__title-left">
                            <h1 class="ra-article__title"
                                contenteditable="true"
                                spellcheck="false"
                                oninput={handleTitleInput}
                                onkeydown={handleTitleKeyDown}>{article.title}</h1>
                            <lightning-badge
                                label={statusLabel}
                                icon-name="utility:list"
                                class="ra-status">
                            </lightning-badge>
                            <template lwc:if={showCollaborators}>
                                <ui-collaborator-avatars
                                    collaborators={activeCollaborators}
                                    extra-count={extraCollaboratorCount}
                                    class="ra-collab-heads">
                                </ui-collaborator-avatars>
                            </template>
                        </div>
                        <div class="ra-ai-toggle">
                            <lightning-input
                                type="toggle"
                                label="Show AI Preview"
                                checked={showAiPreview}
                                onchange={handleToggleAiPreview}
                                class="ra-ai-toggle__input"
                                message-toggle-active=""
                                message-toggle-inactive="">
                            </lightning-input>
                        </div>
                        <div class="ra-save-split">
                            <button type="button" class="ra-save-split__main" onclick={handleSave}>Save</button>
                            <button type="button" class="ra-save-split__drop" aria-label="More save options" onclick={handleSaveDropdown}>
                                <lightning-icon icon-name="utility:down" size="xx-small"></lightning-icon>
                            </button>
                        </div>
                    </div>
                </header>
                <nav class="ra-tabs" role="tablist" aria-label="Article view">
                    <template for:each={articleTabs} for:item="tab">
                        <div key={tab.id} class={tab.class} role="tab" aria-selected={tab.active}>
                            <button
                                type="button"
                                class="ra-tab__label"
                                data-tab={tab.id}
                                onclick={handleTabClick}>{tab.label}</button>
                            <lightning-badge label={tab.count} class="ra-tab__count"></lightning-badge>
                        </div>
                    </template>
                </nav>
                <div class="ra-card-body">
                <template lwc:if={isMetadataTab}>
                    <div class="ra-meta ra-tabpane">
                        <!-- Metadata section (AI-generated, editable) -->
                        <section class="ra-meta-section">
                            <button type="button" class="ra-meta-section__head"
                                aria-expanded={metaSectionOpen} onclick={handleToggleMetaSection}>
                                <lightning-icon icon-name={metaChevron} size="x-small"
                                    class="ra-meta-section__chevron" alternative-text="Toggle section"></lightning-icon>
                                <span class="ra-meta-section__title">Metadata</span>
                            </button>
                            <template lwc:if={metaSectionOpen}>
                                <div class="ra-meta-grid">
                                    <div class="ra-meta-col">
                                        <template for:each={metadataFieldsLeft} for:item="f">
                                            <div key={f.id} class={f.fieldClass}>
                                                <div class="ra-meta-field__label">
                                                    <template lwc:if={f.required}>
                                                        <span class="ra-meta-field__req" aria-hidden="true">*</span>
                                                    </template>
                                                    <span class="ra-meta-field__name">{f.label}</span>
                                                    <template lwc:if={f.showSparkle}>
                                                        <lightning-icon icon-name="utility:sparkle" size="xx-small"
                                                            class="ra-meta-field__sparkle" alternative-text="AI generated"></lightning-icon>
                                                    </template>
                                                    <template lwc:if={f.isDirty}>
                                                        <lightning-button-icon
                                                            icon-name="utility:undo"
                                                            variant="bare"
                                                            size="small"
                                                            alternative-text="Revert changes"
                                                            data-id={f.id}
                                                            onclick={handleMetaUndo}
                                                            class="ra-meta-field__undo">
                                                        </lightning-button-icon>
                                                    </template>
                                                </div>
                                                <template lwc:if={f.isCombobox}>
                                                    <div class="ra-meta-combobox-wrap">
                                                        <div class="ra-meta-combobox">
                                                            <input type="text" class="ra-meta-combobox__input"
                                                                placeholder="Search or select…" value={f.inputValue}
                                                                data-id={f.id} role="combobox" aria-expanded={f.isOpen}
                                                                onfocus={handleComboFocus} oninput={handleComboInput}
                                                                onblur={handleComboBlur} />
                                                            <button type="button" class="ra-meta-combobox__chevron-btn"
                                                                data-id={f.id} tabindex="-1" aria-label="Toggle options"
                                                                onmousedown={handleComboChevron}>
                                                                <lightning-icon icon-name="utility:down" size="xx-small"
                                                                    class="ra-meta-combobox__chevron" alternative-text=""></lightning-icon>
                                                            </button>
                                                            <template lwc:if={f.ai}>
                                                                <div class="ra-meta-combobox__sparkle-wrap">
                                                                    <lightning-icon icon-name="utility:sparkles" size="x-small"
                                                                        class="ra-meta-combobox__sparkle" alternative-text="Generate with AI"></lightning-icon>
                                                                </div>
                                                            </template>
                                                        </div>
                                                        <template lwc:if={f.isOpen}>
                                                            <ul class="ra-meta-listbox" role="listbox">
                                                                <template for:each={f.filteredOptions} for:item="opt">
                                                                    <li key={opt.id} role="option" class={opt.optionClass}
                                                                        aria-selected={opt.selected}
                                                                        data-field={f.id} data-label={opt.label}
                                                                        onmousedown={handleOptionSelect}>
                                                                        <span class="ra-meta-listbox__check-slot">
                                                                            <template lwc:if={opt.selected}>
                                                                                <lightning-icon icon-name="utility:check" size="xx-small"
                                                                                    class="ra-meta-listbox__check" alternative-text="Selected"></lightning-icon>
                                                                            </template>
                                                                        </span>
                                                                        <span class="ra-meta-listbox__label">{opt.label}</span>
                                                                    </li>
                                                                </template>
                                                                <template lwc:if={f.noOptions}>
                                                                    <li class="ra-meta-listbox__empty">No matches</li>
                                                                </template>
                                                            </ul>
                                                        </template>
                                                    </div>
                                                    <template lwc:if={f.hasTags}>
                                                        <div class="ra-meta-tags">
                                                            <template for:each={f.tags} for:item="t">
                                                                <lightning-pill key={t.id} label={t.label}
                                                                    data-field={f.id} data-tag={t.id}
                                                                    onremove={handleMetaTagRemove}
                                                                    class="ra-meta-pill">
                                                                </lightning-pill>
                                                            </template>
                                                            <template lwc:if={f.showExtra}>
                                                                <button type="button" class="ra-meta-tags__more">{f.extraLabel}</button>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template lwc:if={f.isInput}>
                                                    <lightning-input type="text" variant="label-hidden"
                                                        label={f.label} placeholder="Input text" value={f.value}
                                                        data-id={f.id} onchange={handleMetaInput}
                                                        class="ra-meta-linput"></lightning-input>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="ra-meta-col">
                                        <template for:each={metadataFieldsRight} for:item="f">
                                            <div key={f.id} class={f.fieldClass}>
                                                <div class="ra-meta-field__label">
                                                    <template lwc:if={f.required}>
                                                        <span class="ra-meta-field__req" aria-hidden="true">*</span>
                                                    </template>
                                                    <span class="ra-meta-field__name">{f.label}</span>
                                                    <template lwc:if={f.showSparkle}>
                                                        <lightning-icon icon-name="utility:sparkle" size="xx-small"
                                                            class="ra-meta-field__sparkle" alternative-text="AI generated"></lightning-icon>
                                                    </template>
                                                    <template lwc:if={f.isDirty}>
                                                        <lightning-button-icon
                                                            icon-name="utility:undo"
                                                            variant="bare"
                                                            size="small"
                                                            alternative-text="Revert changes"
                                                            data-id={f.id}
                                                            onclick={handleMetaUndo}
                                                            class="ra-meta-field__undo">
                                                        </lightning-button-icon>
                                                    </template>
                                                </div>
                                                <template lwc:if={f.isCombobox}>
                                                    <div class="ra-meta-combobox-wrap">
                                                        <div class="ra-meta-combobox">
                                                            <input type="text" class="ra-meta-combobox__input"
                                                                placeholder="Search or select…" value={f.inputValue}
                                                                data-id={f.id} role="combobox" aria-expanded={f.isOpen}
                                                                onfocus={handleComboFocus} oninput={handleComboInput}
                                                                onblur={handleComboBlur} />
                                                            <button type="button" class="ra-meta-combobox__chevron-btn"
                                                                data-id={f.id} tabindex="-1" aria-label="Toggle options"
                                                                onmousedown={handleComboChevron}>
                                                                <lightning-icon icon-name="utility:down" size="xx-small"
                                                                    class="ra-meta-combobox__chevron" alternative-text=""></lightning-icon>
                                                            </button>
                                                            <template lwc:if={f.ai}>
                                                                <div class="ra-meta-combobox__sparkle-wrap">
                                                                    <lightning-icon icon-name="utility:sparkles" size="x-small"
                                                                        class="ra-meta-combobox__sparkle" alternative-text="Generate with AI"></lightning-icon>
                                                                </div>
                                                            </template>
                                                        </div>
                                                        <template lwc:if={f.isOpen}>
                                                            <ul class="ra-meta-listbox" role="listbox">
                                                                <template for:each={f.filteredOptions} for:item="opt">
                                                                    <li key={opt.id} role="option" class={opt.optionClass}
                                                                        aria-selected={opt.selected}
                                                                        data-field={f.id} data-label={opt.label}
                                                                        onmousedown={handleOptionSelect}>
                                                                        <span class="ra-meta-listbox__check-slot">
                                                                            <template lwc:if={opt.selected}>
                                                                                <lightning-icon icon-name="utility:check" size="xx-small"
                                                                                    class="ra-meta-listbox__check" alternative-text="Selected"></lightning-icon>
                                                                            </template>
                                                                        </span>
                                                                        <span class="ra-meta-listbox__label">{opt.label}</span>
                                                                    </li>
                                                                </template>
                                                                <template lwc:if={f.noOptions}>
                                                                    <li class="ra-meta-listbox__empty">No matches</li>
                                                                </template>
                                                            </ul>
                                                        </template>
                                                    </div>
                                                    <template lwc:if={f.hasTags}>
                                                        <div class="ra-meta-tags">
                                                            <template for:each={f.tags} for:item="t">
                                                                <lightning-pill key={t.id} label={t.label}
                                                                    data-field={f.id} data-tag={t.id}
                                                                    onremove={handleMetaTagRemove}
                                                                    class="ra-meta-pill">
                                                                </lightning-pill>
                                                            </template>
                                                            <template lwc:if={f.showExtra}>
                                                                <button type="button" class="ra-meta-tags__more">{f.extraLabel}</button>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template lwc:if={f.isInput}>
                                                    <lightning-input type="text" variant="label-hidden"
                                                        label={f.label} placeholder="Input text" value={f.value}
                                                        data-id={f.id} onchange={handleMetaInput}
                                                        class="ra-meta-linput"></lightning-input>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </section>

                        <!-- Properties section (read-only) -->
                        <section class="ra-meta-section">
                            <button type="button" class="ra-meta-section__head"
                                aria-expanded={propsSectionOpen} onclick={handleTogglePropsSection}>
                                <lightning-icon icon-name={propsChevron} size="x-small"
                                    class="ra-meta-section__chevron" alternative-text="Toggle section"></lightning-icon>
                                <span class="ra-meta-section__title">Properties</span>
                            </button>
                            <template lwc:if={propsSectionOpen}>
                                <div class="ra-meta-grid ra-meta-grid_props">
                                    <template for:each={metadataProperties} for:item="p">
                                        <div key={p.id} class="ra-meta-prop">
                                            <span class="ra-meta-prop__label">
                                                <span class="ra-meta-prop__name">{p.label}</span>
                                            </span>
                                            <lightning-formatted-text value={p.value}
                                                class="ra-meta-prop__value"></lightning-formatted-text>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </section>
                    </div>
                </template>
                <template lwc:elseif={isEnrichmentsTab}>
                    <div class="ra-enrich ra-tabpane">
                        <!-- AI Generated Abstract (Figma 462:63733) -->
                        <article class="ra-enrich-abstract">
                            <div class="ra-enrich-abstract__head">
                                <h2 class="ra-enrich-abstract__title">AI Generated Abstract</h2>
                                <lightning-button-icon icon-name="utility:refresh" variant="bare"
                                    size="small" alternative-text="Regenerate abstract"
                                    onclick={handleRegenerateAbstract}
                                    class="ra-enrich-abstract__refresh"></lightning-button-icon>
                            </div>
                            <div class="ra-enrich-summary">
                                <div class="ra-enrich-summary__label">
                                    <lightning-icon icon-name="utility:sparkles" size="xx-small"
                                        class="ra-enrich-summary__sparkle" alternative-text=""></lightning-icon>
                                    <span class="ra-enrich-summary__title">Article Summary</span>
                                    <lightning-icon icon-name="utility:info" size="xx-small"
                                        class="ra-enrich-summary__info" alternative-text="About this summary"></lightning-icon>
                                </div>
                                <p class="ra-enrich-summary__text">{aiAbstract.summary}</p>
                            </div>
                        </article>

                        <!-- Top Questions this Article answers -->
                        <section class="ra-meta-section">
                            <button type="button" class="ra-meta-section__head"
                                aria-expanded={questionsSectionOpen} onclick={handleToggleQuestionsSection}>
                                <lightning-icon icon-name={questionsChevron} size="x-small"
                                    class="ra-meta-section__chevron" alternative-text="Toggle section"></lightning-icon>
                                <span class="ra-meta-section__title">Top Questions this Article answers</span>
                            </button>
                            <template lwc:if={questionsSectionOpen}>
                                <div class="ra-enrich-questions">
                                    <template for:each={enrichmentQuestionList} for:item="q">
                                        <div key={q.id} class="ra-enrich-q-item">
                                            <template lwc:if={q.editing}>
                                                <div class="ra-enrich-q ra-enrich-q_editing">
                                                    <lightning-input type="text" variant="label-hidden"
                                                        label="Question" data-id={q.id} value={draftQuestionText}
                                                        onchange={handleQuestionDraftTextChange}
                                                        class="ra-enrich-q__qinput"></lightning-input>
                                                    <lightning-textarea variant="label-hidden" label="Answer"
                                                        data-id={q.id} value={draftQuestionAnswer}
                                                        onchange={handleQuestionDraftAnswerChange}
                                                        class="ra-enrich-q__ainput"></lightning-textarea>
                                                </div>
                                                <div class="ra-enrich-q__editactions">
                                                    <lightning-button-icon icon-name="utility:check"
                                                        variant="border-filled" size="medium"
                                                        alternative-text="Save changes" data-id={q.id}
                                                        onclick={handleQuestionEditSave}
                                                        class="ra-enrich-q__save"></lightning-button-icon>
                                                    <lightning-button-icon icon-name="utility:close"
                                                        variant="border-filled" size="medium"
                                                        alternative-text="Discard changes" data-id={q.id}
                                                        onclick={handleQuestionEditCancel}
                                                        class="ra-enrich-q__cancel"></lightning-button-icon>
                                                </div>
                                            </template>
                                            <template lwc:else>
                                                <div class={q.cardClass}>
                                                    <div class="ra-enrich-q__head">
                                                        <lightning-icon icon-name={q.chevron} size="xx-small"
                                                            class="ra-enrich-q__chevron" alternative-text="Toggle answer"
                                                            data-id={q.id} onclick={handleQuestionToggle}></lightning-icon>
                                                        <span class="ra-enrich-q__text" data-id={q.id}
                                                            onclick={handleQuestionToggle}>{q.text}</span>
                                                        <lightning-button-icon icon-name="utility:edit" variant="bare"
                                                            size="small" alternative-text="Edit question"
                                                            data-id={q.id} onclick={handleQuestionEdit}
                                                            class="ra-enrich-q__edit"></lightning-button-icon>
                                                    </div>
                                                    <template lwc:if={q.expanded}>
                                                        <p class="ra-enrich-q__answer">{q.answer}</p>
                                                    </template>
                                                </div>
                                                <lightning-button-icon icon-name="utility:delete"
                                                    variant="border-filled" size="medium"
                                                    alternative-text="Delete question" data-id={q.id}
                                                    onclick={handleQuestionDelete}
                                                    class="ra-enrich-q__delete"></lightning-button-icon>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </section>

                        <!-- Related Entities -->
                        <section class="ra-meta-section">
                            <button type="button" class="ra-meta-section__head"
                                aria-expanded={entitiesSectionOpen} onclick={handleToggleEntitiesSection}>
                                <lightning-icon icon-name={entitiesChevron} size="x-small"
                                    class="ra-meta-section__chevron" alternative-text="Toggle section"></lightning-icon>
                                <span class="ra-meta-section__title">Related Entities</span>
                            </button>
                            <template lwc:if={entitiesSectionOpen}>
                                <div class="ra-meta-grid">
                                    <template for:each={relatedEntityFields} for:item="f">
                                        <div key={f.id} class="ra-meta-col">
                                            <div class="ra-meta-field">
                                                <div class="ra-meta-field__label">
                                                    <template lwc:if={f.required}>
                                                        <span class="ra-meta-field__req" aria-hidden="true">*</span>
                                                    </template>
                                                    <span class="ra-meta-field__name">{f.label}</span>
                                                    <lightning-icon icon-name="utility:sparkle" size="xx-small"
                                                        class="ra-meta-field__add" alternative-text="Add with AI"></lightning-icon>
                                                </div>
                                                <div class="ra-meta-combobox-wrap">
                                                    <div class="ra-meta-combobox">
                                                        <input type="text" class="ra-meta-combobox__input"
                                                            placeholder="Search or select…" value={f.inputValue}
                                                            data-id={f.id} role="combobox" aria-expanded={f.isOpen}
                                                            onfocus={handleComboFocus} oninput={handleComboInput}
                                                            onblur={handleComboBlur} />
                                                        <button type="button" class="ra-meta-combobox__chevron-btn"
                                                            data-id={f.id} tabindex="-1" aria-label="Toggle options"
                                                            onmousedown={handleComboChevron}>
                                                            <lightning-icon icon-name="utility:down" size="xx-small"
                                                                class="ra-meta-combobox__chevron" alternative-text=""></lightning-icon>
                                                        </button>
                                                        <template lwc:if={f.ai}>
                                                            <div class="ra-meta-combobox__sparkle-wrap">
                                                                <lightning-icon icon-name="utility:sparkles" size="x-small"
                                                                    class="ra-meta-combobox__sparkle" alternative-text="Generate with AI"></lightning-icon>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <template lwc:if={f.isOpen}>
                                                        <ul class="ra-meta-listbox" role="listbox">
                                                            <template for:each={f.filteredOptions} for:item="opt">
                                                                <li key={opt.id} role="option" class={opt.optionClass}
                                                                    aria-selected={opt.selected}
                                                                    data-field={f.id} data-label={opt.label}
                                                                    onmousedown={handleOptionSelect}>
                                                                    <span class="ra-meta-listbox__check-slot">
                                                                        <template lwc:if={opt.selected}>
                                                                            <lightning-icon icon-name="utility:check" size="xx-small"
                                                                                class="ra-meta-listbox__check" alternative-text="Selected"></lightning-icon>
                                                                        </template>
                                                                    </span>
                                                                    <span class="ra-meta-listbox__label">{opt.label}</span>
                                                                </li>
                                                            </template>
                                                            <template lwc:if={f.noOptions}>
                                                                <li class="ra-meta-listbox__empty">No matches</li>
                                                            </template>
                                                        </ul>
                                                    </template>
                                                </div>
                                                <template lwc:if={f.hasTags}>
                                                    <div class="ra-meta-tags">
                                                        <template for:each={f.tags} for:item="t">
                                                            <lightning-pill key={t.id} label={t.label}
                                                                data-field={f.id} data-tag={t.id}
                                                                onremove={handleMetaTagRemove}
                                                                class="ra-meta-pill">
                                                            </lightning-pill>
                                                        </template>
                                                        <template lwc:if={f.showExtra}>
                                                            <button type="button" class="ra-meta-tags__more">{f.extraLabel}</button>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </section>
                    </div>
                </template>
                <template lwc:else>
                <div class="ra-editor-card ra-tabpane">
                <!-- Editor toolbars (Figma 125:67886) ─────────────────
                     Two-row toolbar above the article body: a menu bar
                     (File, Edit, ...) and a format toolbar that drives
                     execCommand on the unified contenteditable editor. -->
                <div class="ra-toolbar" role="toolbar" aria-label="Editor toolbar">
                    <div class="ra-toolbar__menubar">
                        <template for:each={editorMenuItems} for:item="m">
                            <button
                                key={m.id}
                                type="button"
                                class="ra-toolbar__menu-btn"
                                data-menu={m.id}
                                onclick={handleEditorMenuClick}>{m.label}</button>
                        </template>
                        <button
                            type="button"
                            class="ra-toolbar__menu-icon"
                            aria-label="Editor help"
                            onclick={handleEditorMenuHelp}>
                            <lightning-icon icon-name="utility:question_mark" size="xx-small"></lightning-icon>
                        </button>
                    </div>
                    <div class="ra-toolbar__formatbar">
                        <!-- Expand -->
                        <button
                            type="button"
                            class="ra-tbtn ra-tbtn_icon"
                            aria-label="Expand editor"
                            onclick={handleToolbarExpand}>
                            <lightning-icon icon-name="utility:expand_alt" size="xx-small"></lightning-icon>
                        </button>
                        <!-- Redo -->
                        <button
                            type="button"
                            class="ra-tbtn ra-tbtn_icon"
                            aria-label="Redo"
                            onclick={handleRedo}>
                            <lightning-icon icon-name="utility:redo" size="xx-small"></lightning-icon>
                        </button>
                        <!-- Undo -->
                        <button
                            type="button"
                            class="ra-tbtn ra-tbtn_icon"
                            aria-label="Undo"
                            onclick={handleUndo}>
                            <lightning-icon icon-name="utility:undo" size="xx-small"></lightning-icon>
                        </button>
                        <span class="ra-tb-divider" aria-hidden="true"></span>
                        <!-- Paragraph style dropdown -->
                        <select
                            class="ra-tb-select"
                            aria-label="Paragraph style"
                            value={editorBlockStyle}
                            onchange={handleEditorBlockStyle}>
                            <option value="p">Paragraph</option>
                            <option value="h1">Heading 1</option>
                            <option value="h2">Heading 2</option>
                            <option value="h3">Heading 3</option>
                            <option value="quote">Quote</option>
                        </select>
                        <span class="ra-tb-divider" aria-hidden="true"></span>
                        <!-- Bold / Italic / Underline / Strikethrough -->
                        <button type="button" class="ra-tbtn ra-tbtn_text" aria-label="Bold" data-cmd="bold" onclick={handleFormatCommand}><strong>B</strong></button>
                        <button type="button" class="ra-tbtn ra-tbtn_text" aria-label="Italic" data-cmd="italic" onclick={handleFormatCommand}><em>I</em></button>
                        <button type="button" class="ra-tbtn ra-tbtn_text" aria-label="Underline" data-cmd="underline" onclick={handleFormatCommand}><u>U</u></button>
                        <button type="button" class="ra-tbtn ra-tbtn_text" aria-label="Strikethrough" data-cmd="strikeThrough" onclick={handleFormatCommand}><s>S</s></button>
                        <span class="ra-tb-divider" aria-hidden="true"></span>
                        <!-- Text color -->
                        <button type="button" class="ra-tbtn ra-tbtn_icon ra-tbtn_color-picker" aria-label="Text color" data-cmd="foreColor" data-arg="#066afe" onclick={handleFormatCommand}>
                            <span class="ra-tb-letter ra-tb-letter_color" aria-hidden="true">A</span>
                            <span class="ra-tb-chevron" aria-hidden="true"></span>
                        </button>
                        <!-- Highlight -->
                        <button type="button" class="ra-tbtn ra-tbtn_icon ra-tbtn_color-picker" aria-label="Highlight" data-cmd="hiliteColor" data-arg="#fff3cd" onclick={handleFormatCommand}>
                            <lightning-icon icon-name="utility:brush" size="xx-small"></lightning-icon>
                            <span class="ra-tb-chevron" aria-hidden="true"></span>
                        </button>
                        <!-- Clear formatting -->
                        <button type="button" class="ra-tbtn ra-tbtn_icon" aria-label="Clear formatting" data-cmd="removeFormat" onclick={handleFormatCommand}>
                            <span class="ra-tb-letter ra-tb-letter_clear" aria-hidden="true">T<sub>x</sub></span>
                        </button>
                        <span class="ra-tb-divider" aria-hidden="true"></span>
                        <!-- Alignment -->
                        <button type="button" class="ra-tbtn ra-tbtn_icon" aria-label="Align left" data-cmd="justifyLeft" onclick={handleFormatCommand}>
                            <lightning-icon icon-name="utility:left_align_text" size="xx-small"></lightning-icon>
                        </button>
                        <button type="button" class="ra-tbtn ra-tbtn_icon" aria-label="Align center" data-cmd="justifyCenter" onclick={handleFormatCommand}>
                            <lightning-icon icon-name="utility:center_align_text" size="xx-small"></lightning-icon>
                        </button>
                        <button type="button" class="ra-tbtn ra-tbtn_icon" aria-label="Align right" data-cmd="justifyRight" onclick={handleFormatCommand}>
                            <lightning-icon icon-name="utility:right_align_text" size="xx-small"></lightning-icon>
                        </button>
                        <button type="button" class="ra-tbtn ra-tbtn_icon" aria-label="Justify" data-cmd="justifyFull" onclick={handleFormatCommand}>
                            <lightning-icon icon-name="utility:justify_text" size="xx-small"></lightning-icon>
                        </button>
                        <span class="ra-tb-divider" aria-hidden="true"></span>
                        <!-- Insert button -->
                        <button type="button" class="ra-tbtn ra-tbtn_insert" aria-label="Insert" onclick={handleToolbarInsert}>
                            <lightning-icon icon-name="utility:add" size="xx-small"></lightning-icon>
                        </button>
                    </div>
                </div>
                <!-- Unified contenteditable editor body. Wrapped in
                     .ra-editor-host so the Grammarly-style inline AI
                     suggestion popover can sit as a sibling and be
                     position:absolute relative to a stable container
                     (the contenteditable itself scrolls and is reset
                     via innerHTML at init, so we cannot host the
                     popover inside it). -->
                <div class="ra-editor-host">
                    <div class="ra-article__body ra-editor"
                        contenteditable="true"
                        spellcheck="true"
                        oninput={handleEditorInput}
                        onkeydown={handleEditorKeyDown}
                        onfocus={handleEditorFocus}
                        onblur={handleEditorBlur}
                        onscroll={handleEditorScroll}>
                    </div>
                    <template lwc:if={_activeSuggestion}>
                        <div class={_activeSuggestion.popoverClass}
                            style={_activeSuggestion.style}
                            role="dialog"
                            aria-label="AI suggestion"
                            onmouseenter={handlePopoverEnter}
                            onmouseleave={handlePopoverLeave}
                            onclick={handlePopoverEnter}>
                            <div class="ai-popover__header">
                                <span class="ai-popover__type">
                                    <lightning-icon
                                        icon-name={_activeSuggestion.brandIcon}
                                        size="xx-small"
                                        alternative-text="AI suggestion"
                                        class="ai-popover__brand-icon">
                                    </lightning-icon>
                                    <span class="ai-popover__type-label">{_activeSuggestion.label}</span>
                                </span>
                                <span class="ai-popover__header-actions">
                                    <lightning-button-icon
                                        icon-name="utility:close"
                                        variant="border"
                                        size="small"
                                        alternative-text="Close suggestion card"
                                        class="ai-popover__header-btn ai-popover__close"
                                        onclick={handleSuggestionClose}>
                                    </lightning-button-icon>
                                </span>
                            </div>
                            <template lwc:if={_activeSuggestion.isAddition}>
                                <div class="ai-popover__diff">
                                    <div class="ai-popover__diff-block ai-popover__diff-block_anchor">
                                        <span class="ai-popover__diff-label">After</span>
                                        <p class="ai-popover__anchor">{_activeSuggestion.original}</p>
                                    </div>
                                    <div class="ai-popover__diff-block ai-popover__diff-block_add">
                                        <span class="ai-popover__diff-label">
                                            <lightning-icon
                                                icon-name="utility:add"
                                                size="xx-small"
                                                alternative-text="Add"
                                                class="ai-popover__add-icon">
                                            </lightning-icon>
                                            Suggested addition
                                        </span>
                                        <p class="ai-popover__add">{_activeSuggestion.addition}</p>
                                    </div>
                                </div>
                            </template>
                            <template lwc:else>
                                <div class="ai-popover__diff">
                                    <div class="ai-popover__diff-block ai-popover__diff-block_from">
                                        <span class="ai-popover__diff-label">Current</span>
                                        <p class="ai-popover__from">{_activeSuggestion.original}</p>
                                    </div>
                                    <div class="ai-popover__diff-block ai-popover__diff-block_to">
                                        <span class="ai-popover__diff-label">Suggested rewrite</span>
                                        <p class="ai-popover__to">{_activeSuggestion.replacement}</p>
                                    </div>
                                </div>
                            </template>
                            <p class="ai-popover__explanation">{_activeSuggestion.explanation}</p>
                            <div class="ai-popover__actions">
                                <lightning-button
                                    label="Dismiss"
                                    variant="neutral"
                                    class="ai-popover__btn"
                                    onclick={handleSuggestionDismiss}>
                                </lightning-button>
                                <lightning-button
                                    label={_activeSuggestion.acceptLabel}
                                    variant="brand"
                                    class="ai-popover__btn ai-popover__btn_accept"
                                    onclick={handleSuggestionAccept}>
                                </lightning-button>
                            </div>
                        </div>
                    </template>
                </div>
                <!-- Word count footer -->
                <div class="ra-editor__footer">
                    <span class="ra-editor__wordcount">{wordCount} words</span>
                </div>
                </div>
                </template>
                </div>
            </div>
        </main>

        <div class={chatPanelClass}>
            <ui-chat-panel
                messages={chatMessages}
                onsend={handleChatSend}
                onapplyaction={handleApplyChatAction}
                onrejectaction={handleRejectChatAction}>
            </ui-chat-panel>
        </div>
    </div>
</template>
