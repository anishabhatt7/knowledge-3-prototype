<template lwc:render-mode="light">
    <div class="cc-page">
        <!-- ═══ LEFT RAIL ═══ -->
        <nav class={railClass} aria-label="Knowledge navigation">
            <div class="kh-rail__top">
                <template for:each={railTopItems} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Maintain</div>
                <template for:each={railMaintainComputed} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Create</div>
                <template for:each={railCreate} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class="kh-rail__row"
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>
            </div>

            <div class="kh-rail__bottom">
                <button
                    type="button"
                    class="kh-rail__row kh-rail__row--collapse"
                    aria-label={collapseAriaLabel}
                    onclick={handleToggleRail}
                >
                    <lightning-icon
                        icon-name={collapseIconName}
                        size="x-small"
                        alternative-text={collapseAriaLabel}
                        class="kh-rail__icon"
                    ></lightning-icon>
                    <span class="kh-rail__label">Collapse</span>
                </button>
            </div>
        </nav>

        <!-- ═══ MAIN CONTENT ═══ -->
        <main class="cc-main">
            <!-- Page header (Figma 214:32880 / "Knowledge Health") -->
            <section class="cc-section cc-section--header">
                <div class="cc-header">
                    <div class="cc-header__left">
                        <lightning-icon
                            icon-name="standard:lightning_usage"
                            size="medium"
                            alternative-text="Knowledge Health"
                            class="cc-header__icon"
                        ></lightning-icon>
                        <div class="cc-header__text">
                            <h1 class="cc-header__title">Knowledge Health</h1>
                            <p class="cc-header__subtitle">Unified view of decisions, expertise, and organizational knowledge</p>
                        </div>
                    </div>
                    <div class="cc-header__search">
                        <lightning-input
                            type="search"
                            placeholder="Search…"
                            variant="label-hidden"
                            label="Search"
                        ></lightning-input>
                    </div>
                </div>
            </section>

            <!-- Two-card overview row: AI Readiness + Total Articles -->
            <section class="cc-section">
                <div class="cc-overview-row">
                    <!-- Knowledge AI Readiness -->
                    <article class="cc-readiness-card">
                        <h2 class="cc-readiness-card__title">Knowledge AI Readiness</h2>
                        <div class="cc-donut-wrapper">
                            <svg class="cc-donut-svg" viewBox="0 0 160 160">
                                <circle
                                    class="cc-donut-bg"
                                    cx="80"
                                    cy="80"
                                    r="70"
                                    fill="none"
                                    stroke-width="14"
                                ></circle>
                                <circle
                                    class="cc-donut-fg"
                                    cx="80"
                                    cy="80"
                                    r="70"
                                    fill="none"
                                    stroke-width="14"
                                    stroke-dasharray={donutDasharray}
                                    stroke-dashoffset={donutDashoffset}
                                    stroke-linecap="round"
                                ></circle>
                            </svg>
                            <div class="cc-donut-label">
                                <span class="cc-donut-label__value">{readinessOverall}</span>
                            </div>
                        </div>
                        <p class="cc-readiness-card__copy">
                            Completeness and clarity are above target, but duplication risk is dragging the score. Resolve the flagged articles to push readiness past 85%.
                        </p>
                        <lightning-button
                            variant="brand-outline"
                            label="Review Suggestions"
                            class="cc-readiness-card__cta"
                        ></lightning-button>
                    </article>

                    <!-- Total Articles -->
                    <article class="cc-articles-card">
                        <header class="cc-articles-card__head">
                            <h2 class="cc-articles-card__title">Total Articles</h2>
                        </header>
                        <div class="cc-articles-card__metric-row">
                            <span class="cc-articles-card__value">{totalArticlesValue}</span>
                            <lightning-badge
                                class="cc-articles-card__badge"
                                label={totalArticlesBadge}
                            ></lightning-badge>
                        </div>
                        <div class="cc-articles-card__delta">
                            <span class="cc-articles-card__delta-value">{totalArticlesDelta}</span>
                            <span class="cc-articles-card__delta-label">{totalArticlesPeriod}</span>
                        </div>
                        <div class="cc-articles-card__chart" aria-hidden="true">
                            <div class="cc-spark-y-axis">
                                <span class="cc-spark-y-axis__label">##</span>
                                <span class="cc-spark-y-axis__rule"></span>
                                <span class="cc-spark-y-axis__label">##</span>
                            </div>
                            <div class="cc-spark-plot">
                                <svg class="cc-spark-svg" viewBox="0 0 480 110" preserveAspectRatio="none">
                                    <defs>
                                        <linearGradient id="cc-spark-grad" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stop-color="#066afe" stop-opacity="0.18"></stop>
                                            <stop offset="100%" stop-color="#066afe" stop-opacity="0"></stop>
                                        </linearGradient>
                                    </defs>
                                    <line class="cc-spark-goal" x1="0" y1={sparkGoalY} x2="480" y2={sparkGoalY}></line>
                                    <path class="cc-spark-forecast" d={sparkForecastPath}></path>
                                    <path class="cc-spark-line" d={sparkPath}></path>
                                    <path class="cc-spark-line cc-spark-line--projected" d={sparkProjectedPath}></path>
                                </svg>
                                <span class="cc-spark-goal-label" aria-hidden="true">Goal</span>
                            </div>
                            <div class="cc-spark-x-axis">
                                <span class="cc-spark-x-axis__rule"></span>
                                <div class="cc-spark-x-axis__labels">
                                    <span>##</span>
                                    <span>##</span>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </section>

            <!-- Structural Violations table -->
            <section class="cc-section">
                <div class="cc-violations">
                    <header class="cc-violations__header">
                        <div class="cc-violations__heading">
                            <h2 class="cc-violations__title">Structural Violations</h2>
                            <p class="cc-violations__subtitle">Unified view of decisions, expertise, and organizational knowledge</p>
                        </div>
                        <lightning-button-group class="cc-violations__actions">
                            <lightning-button
                                variant="brand-outline"
                                label="Review in Queue"
                                class="cc-violations__action cc-violations__action--left"
                            ></lightning-button>
                            <lightning-button
                                variant="brand-outline"
                                label="Approve All"
                                class="cc-violations__action cc-violations__action--right"
                            ></lightning-button>
                        </lightning-button-group>
                    </header>

                    <div class="cc-vt" role="table" aria-label="Structural violations">
                        <!-- Header row -->
                        <div class="cc-vt__row cc-vt__row--head" role="row">
                            <div class="cc-vt__cell cc-vt__cell--check" role="columnheader">
                                <input
                                    type="checkbox"
                                    class="cc-vt__checkbox"
                                    aria-label="Select all violations"
                                    onchange={handleSelectAll}
                                />
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--article" role="columnheader">
                                <span class="cc-vt__head-label">Article</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" alternative-text="Sort"></lightning-icon>
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--desc" role="columnheader">
                                <span class="cc-vt__head-label">Description</span>
                                <lightning-icon icon-name="utility:arrowdown" size="xx-small" alternative-text="Sort descending"></lightning-icon>
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--num" role="columnheader">
                                <span class="cc-vt__head-label">No. of Violations</span>
                                <lightning-icon icon-name="utility:arrowdown" size="xx-small" alternative-text="Sort descending"></lightning-icon>
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--ai" role="columnheader">
                                <span class="cc-vt__head-label">AI Score</span>
                                <lightning-icon icon-name="utility:arrowdown" size="xx-small" alternative-text="Sort descending"></lightning-icon>
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--date" role="columnheader">
                                <span class="cc-vt__head-label">Last Updated on</span>
                                <lightning-icon icon-name="utility:arrowdown" size="xx-small" alternative-text="Sort descending"></lightning-icon>
                            </div>
                            <div class="cc-vt__cell cc-vt__cell--actions" role="columnheader" aria-label="Row actions"></div>
                        </div>

                        <!-- Body rows -->
                        <template for:each={violationsComputed} for:item="v">
                            <div key={v.id} class="cc-vt__row" role="row">
                                <div class="cc-vt__cell cc-vt__cell--check" role="cell">
                                    <input
                                        type="checkbox"
                                        class="cc-vt__checkbox"
                                        data-id={v.id}
                                        checked={v.selected}
                                        aria-label="Select violation"
                                        onchange={handleSelectRow}
                                    />
                                </div>
                                <div class="cc-vt__cell cc-vt__cell--article" role="cell">
                                    <a
                                        href="javascript:void(0);"
                                        class="cc-vt__article-link"
                                        data-id={v.id}
                                        onclick={handleArticleOpen}
                                    >{v.article}</a>
                                </div>
                                <div class="cc-vt__cell cc-vt__cell--desc" role="cell">
                                    <span class="cc-vt__desc">{v.description}</span>
                                </div>
                                <div class="cc-vt__cell cc-vt__cell--num" role="cell">
                                    <span>{v.violations}</span>
                                </div>
                                <div class="cc-vt__cell cc-vt__cell--ai" role="cell">
                                    <span class={v.aiCellClass}>{v.aiScore}</span>
                                </div>
                                <div class="cc-vt__cell cc-vt__cell--date" role="cell">
                                    <span>{v.lastUpdated}</span>
                                </div>
                                <div class={v.actionsCellClass} role="cell">
                                    <button
                                        type="button"
                                        class="cc-vt__actions-btn"
                                        data-id={v.id}
                                        aria-haspopup="menu"
                                        aria-expanded={v.menuOpen}
                                        aria-label="Show row actions"
                                        onclick={handleViolationMenuToggle}
                                    >
                                        <lightning-icon
                                            icon-name="utility:down"
                                            size="xx-small"
                                            alternative-text=""
                                        ></lightning-icon>
                                    </button>
                                    <template lwc:if={v.menuOpen}>
                                        <div class={v.menuClass} role="menu">
                                            <button
                                                type="button"
                                                class="cc-vt__menu-item"
                                                role="menuitem"
                                                data-id={v.id}
                                                onclick={handleApproveChanges}
                                            >Approve changes</button>
                                            <button
                                                type="button"
                                                class="cc-vt__menu-item"
                                                role="menuitem"
                                                data-id={v.id}
                                                onclick={handleEditToResolve}
                                            >Edit to Resolve</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </main>
    </div>
</template>
