<template>
  <div class="author-container">
    <lightning-card title="Guided Author" icon-name="utility:edit">
      <div class="slds-p-around_medium">
        <div class="slds-m-bottom_medium">
          <lightning-combobox
            name="sampleArticle"
            label="Start from Sample Article"
            placeholder="Select an article or write your own"
            options={sampleArticleOptions}
            onchange={handleSampleArticleSelect}
          ></lightning-combobox>
        </div>

        <div class="slds-grid slds-gutters_small">
          <!-- Editor (left 60%) -->
          <div class="slds-col slds-size_3-of-5">
            <div class="slds-text-title slds-m-bottom_xx-small">Article Editor</div>
            <lightning-textarea
              label="Content"
              variant="label-hidden"
              placeholder="Start writing your article here. Real-time RAG analysis appears on the right."
              value={articleContent}
              onchange={handleContentChange}
              rows="20"
              class="editor-area"
            ></lightning-textarea>
          </div>

          <!-- Feedback panel (right 40%) -->
          <div class="slds-col slds-size_2-of-5">
            <div class="slds-text-title slds-m-bottom_xx-small">Live Feedback</div>

            <!-- RAG Score -->
            <div class="slds-m-bottom_small">
              <ui-score-card
                title="RAG Score"
                value={scoreDisplay}
                subtitle={scoreLabel}
                status={scoreStatus}
                icon-name="utility:metrics"
              ></ui-score-card>
            </div>

            <!-- Structure Checks -->
            <lightning-card title="Structure Checks">
              <div class="slds-p-around_small">
                <template if:true={hasContent}>
                  <ul class="slds-list_vertical slds-has-dividers_around-space">
                    <template for:each={structureChecks} for:item="check">
                      <li key={check.name} class="slds-item slds-p-around_x-small">
                        <div class="slds-grid slds-grid_vertical-align-center">
                          <lightning-icon
                            icon-name={check.iconName}
                            size="x-small"
                            variant={check.variant}
                            class="slds-m-right_x-small"
                          ></lightning-icon>
                          <span class="slds-text-body_small">{check.label}</span>
                        </div>
                      </li>
                    </template>
                  </ul>
                </template>
                <template if:false={hasContent}>
                  <div class="slds-text-body_small slds-text-color_weak slds-text-align_center">
                    Start typing to see live feedback
                  </div>
                </template>
              </div>
            </lightning-card>

            <!-- Violations Quick View -->
            <template if:true={hasViolations}>
              <lightning-card title="Issues Found" class="slds-m-top_small">
                <div class="slds-p-around_small">
                  <ui-violation-list violations={violations}></ui-violation-list>
                </div>
              </lightning-card>
            </template>

            <!-- Writing Tips -->
            <lightning-card title="Writing Tips" class="slds-m-top_small">
              <div class="slds-p-around_small">
                <ul class="slds-list_dotted">
                  <template for:each={writingTips} for:item="tip">
                    <li key={tip} class="slds-text-body_small slds-m-bottom_xx-small">{tip}</li>
                  </template>
                </ul>
              </div>
            </lightning-card>
          </div>
        </div>

        <div class="slds-m-top_medium slds-text-align_center">
          <lightning-button
            label="Add Metadata"
            variant="brand"
            onclick={handleAddMetadata}
            class="slds-m-right_small"
          ></lightning-button>
          <lightning-button
            label="View Enrichment"
            variant="neutral"
            onclick={handleViewEnrichment}
          ></lightning-button>
        </div>
      </div>
    </lightning-card>
  </div>
</template>
