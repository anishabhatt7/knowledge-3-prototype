<template>
  <div class="kb-article">
    <!-- Article Header -->
    <header class="kb-article__header">
      <div class="kb-article__header-main">
        <div class="kb-article__icon">
          <lightning-icon icon-name="standard:knowledge" size="medium" alternative-text="Knowledge"></lightning-icon>
        </div>
        <div class="kb-article__title-block">
          <div class="kb-article__breadcrumb">Knowledge</div>
          <h1 class="kb-article__title">Frequently asked questions about policy coverage</h1>
          <div class="kb-article__metadata">
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Article Number</div>
              <div class="kb-article__metadata-value">000001446</div>
            </div>
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Article Record Type</div>
              <div class="kb-article__metadata-value">FAQ</div>
            </div>
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Version Number</div>
              <div class="kb-article__metadata-value">0</div>
            </div>
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Is Latest Version</div>
              <div class="kb-article__metadata-value">
                <lightning-icon icon-name="utility:check" size="x-small" variant="success" alternative-text="Yes"></lightning-icon>
              </div>
            </div>
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Publication Status</div>
              <div class="kb-article__metadata-value">Draft</div>
            </div>
            <div class="kb-article__metadata-item">
              <div class="kb-article__metadata-label">Language</div>
              <div class="kb-article__metadata-value">English</div>
            </div>
          </div>
        </div>
      </div>
      <div class="kb-article__actions">
        <lightning-button label="Follow" icon-name="utility:add" icon-position="left" variant="neutral"></lightning-button>
        <lightning-button label="Edit" variant="neutral" onclick={handleEditClick}></lightning-button>
        <lightning-button label="Assign" variant="neutral"></lightning-button>
        <lightning-button label="Publish" variant="neutral"></lightning-button>
        <lightning-button-icon icon-name="utility:down" variant="border-filled" alternative-text="More actions"></lightning-button-icon>

        <!-- AI action group with separator -->
        <div class="kb-article__ai-divider"></div>

        <lightning-button
          variant="brand-outline"
          label="Analyze"
          icon-name="utility:einstein"
          icon-position="left"
          onclick={handleAnalyzeClick}
          title="Analyze RAG compliance with AI">
        </lightning-button>
        <lightning-button
          variant="brand-outline"
          label="Get Metadata"
          icon-name="utility:tags"
          icon-position="left"
          onclick={handleMetadataClick}
          title="AI-suggested metadata">
        </lightning-button>
        <lightning-button
          variant="brand-outline"
          label="Enrich"
          icon-name="utility:summary"
          icon-position="left"
          onclick={handleEnrichClick}
          title="AI enrichment (abstract, FAQ, entities)">
        </lightning-button>
        <lightning-button
          variant="brand-outline"
          label="Dashboard"
          icon-name="utility:metrics"
          icon-position="left"
          onclick={handleDashboardClick}
          title="KB health dashboard">
        </lightning-button>
      </div>
    </header>

    <!-- Body -->
    <div class="kb-article__body">
      <!-- Left: Main content -->
      <div class="kb-article__main">
        <!-- Tab Nav -->
        <ul class="kb-tabs">
          <li class="kb-tabs__item kb-tabs__item--active">Details</li>
          <li class="kb-tabs__item">Related</li>
          <li class="kb-tabs__item">Version Comparison</li>
          <li class="kb-tabs__item">Translations</li>
          <li class="kb-tabs__item">Approvals</li>
        </ul>

        <!-- Information Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Collapse"></lightning-icon>
            <span class="kb-section__title">Information</span>
          </div>
          <div class="kb-section__body">
            <div class="kb-field">
              <div class="kb-field__label">Title</div>
              <div class="kb-field__value">
                <span>Frequently asked questions about policy coverage</span>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Title"></lightning-button-icon>
              </div>
            </div>
            <div class="kb-field">
              <div class="kb-field__label">
                Summary
                <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-left_xx-small" alternative-text="Info"></lightning-icon>
              </div>
              <div class="kb-field__value">
                <span class="kb-field__placeholder"></span>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Summary"></lightning-button-icon>
              </div>
            </div>
          </div>
        </section>

        <!-- Details Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Collapse"></lightning-icon>
            <span class="kb-section__title">Details</span>
          </div>
          <div class="kb-section__body">
            <div class="kb-field">
              <div class="kb-field__label">Details</div>
              <div class="kb-field__value kb-field__value--rich">
                <div class="kb-rich-content">
                  <p><strong>When is my payment due?</strong><br/>
                  The first payment is due at the time your Activation Letter is sent (including services such as extra FTP accounts, IRO/IRMs, and SSL setups). The following payments will be due on the anniversary date of the order, or on the same day as your other accounts. There are three possible scenarios that define the payment due date.</p>

                  <div class="slds-m-left_medium">
                    <p><strong>First Monthly Account</strong><br/>
                    If this is your first account with FutureQuest, and you have chosen the monthly payment plan, then your first payment will be due on the activation day and each payment thereafter will be due on the same date of each month. So if your account was activated on May 5th, then your payment due date will be the 5th day of each month.</p>

                    <p><strong>Multiple Monthly Accounts</strong><br/>
                    Your first monthly package will determine your due date each month, as explained above. Each monthly package ordered, after the first monthly account, will have its first month's fees pro-rated so that the multiple accounts will all share the same due date as the first account.</p>

                    <p><strong>Annual Account</strong><br/>
                    All annual accounts are due on the day of activation and each year on that same date thereafter. If you had an annual account activated on June 18th, 2001 then the next due date for that package will be on June 18th 2002, regardless whether or not you have other accounts.</p>
                  </div>

                  <p><strong>What if there is an error on my invoice?</strong><br/>
                  If you notice an error on your invoice, simply contact us explaining the error and we will address the situation immediately. It is important that you let us know. Errors left unattended for any length of time become more difficult to correct.</p>

                  <p><strong>Can you send me an invoice by request?</strong><br/>
                  You can actually do this yourself via the community! Once logged in you may review your transaction history and send yourself current or past invoices.</p>

                  <p><strong>How do I update the credit card information you have on file?</strong><br/>
                  To update the credit card on file for the automatic payment plan, simply return to the form where you submitted the original credit card information, located at <a href="#">https://secure.FutureQuest.net/cgi-ssl/Preferred.cgi</a>, and submit the information for the new card just as you did the first time. This will cause the credit card information on file for your account to be updated to the new card you have just submitted.</p>
                </div>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Details" class="kb-field__edit-icon"></lightning-button-icon>
              </div>
            </div>
            <div class="kb-field">
              <div class="kb-field__label">Internal Comments</div>
              <div class="kb-field__value">
                <span class="kb-field__placeholder"></span>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Internal Comments"></lightning-button-icon>
              </div>
            </div>
          </div>
        </section>

        <!-- Chat Answer Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Collapse"></lightning-icon>
            <span class="kb-section__title">Chat Answer</span>
          </div>
          <div class="kb-section__body">
            <div class="kb-field">
              <div class="kb-field__label">Question</div>
              <div class="kb-field__value">
                <span class="kb-field__placeholder"></span>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Question"></lightning-button-icon>
              </div>
            </div>
            <div class="kb-field">
              <div class="kb-field__label">Chat Answer</div>
              <div class="kb-field__value">
                <span>The first payment is due at the time your Activation Letter is sent (including services such as extra FTP accounts, IRO/IRMs, and SSL setups).</span>
                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" alternative-text="Edit Chat Answer"></lightning-button-icon>
              </div>
            </div>
          </div>
        </section>

        <!-- Properties Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevronright" size="x-small" alternative-text="Expand"></lightning-icon>
            <span class="kb-section__title">Properties</span>
          </div>
        </section>

        <!-- AI Metadata Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Collapse"></lightning-icon>
            <span class="kb-section__title">
              <lightning-icon icon-name="utility:einstein" size="xx-small" class="slds-m-right_xx-small" alternative-text="AI"></lightning-icon>
              AI Metadata
            </span>
            <template if:true={hasAcceptedMetadata}>
              <span class="kb-section__badge kb-section__badge--success">Accepted</span>
            </template>
          </div>
          <div class="kb-section__body">
            <template if:true={hasAcceptedMetadata}>
              <div class="kb-metadata-grid">
                <template for:each={metadataDisplayRows} for:item="row">
                  <div key={row.key} class="kb-field">
                    <div class="kb-field__label">{row.label}</div>
                    <div class="kb-field__value">
                      <template if:true={row.hasValue}>
                        <span class="kb-metadata-value">{row.value}</span>
                      </template>
                      <template if:false={row.hasValue}>
                        <span class="kb-field__empty">—</span>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template if:false={hasAcceptedMetadata}>
              <div class="kb-empty-state">
                <lightning-icon icon-name="utility:einstein" size="small" alternative-text="AI"></lightning-icon>
                <div class="kb-empty-state__text">No metadata generated yet.</div>
                <div class="kb-empty-state__hint">Click <strong>Get Metadata</strong> in the header to use AI to suggest metadata for this article.</div>
              </div>
            </template>
          </div>
        </section>

        <!-- AI Enrichment Section -->
        <section class="kb-section">
          <div class="kb-section__header">
            <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Collapse"></lightning-icon>
            <span class="kb-section__title">
              <lightning-icon icon-name="utility:einstein" size="xx-small" class="slds-m-right_xx-small" alternative-text="AI"></lightning-icon>
              AI Enrichment
            </span>
            <template if:true={hasApprovedEnrichment}>
              <span class="kb-section__badge kb-section__badge--success">Approved</span>
            </template>
          </div>
          <div class="kb-section__body">
            <template if:true={hasApprovedEnrichment}>
              <!-- Abstract -->
              <div class="kb-field">
                <div class="kb-field__label">AI Abstract</div>
                <div class="kb-enrichment-abstract">{enrichmentAbstract}</div>
              </div>

              <!-- FAQs -->
              <template if:true={hasFaqs}>
                <div class="kb-field">
                  <div class="kb-field__label">FAQ Questions</div>
                  <ul class="kb-enrichment-faqs">
                    <template for:each={enrichmentFaqs} for:item="faq">
                      <li key={faq} class="kb-enrichment-faqs__item">{faq}</li>
                    </template>
                  </ul>
                </div>
              </template>

              <!-- Entities -->
              <div class="kb-field">
                <div class="kb-field__label">Extracted Entities</div>
                <div class="kb-enrichment-entities">
                  <template if:true={hasEntityProducts}>
                    <div class="kb-entity-group">
                      <span class="kb-entity-group__label">Products:</span>
                      <template for:each={entityProducts} for:item="entity">
                        <span key={entity} class="kb-entity-pill kb-entity-pill--product">{entity}</span>
                      </template>
                    </div>
                  </template>
                  <template if:true={hasEntityFeatures}>
                    <div class="kb-entity-group">
                      <span class="kb-entity-group__label">Features:</span>
                      <template for:each={entityFeatures} for:item="entity">
                        <span key={entity} class="kb-entity-pill kb-entity-pill--feature">{entity}</span>
                      </template>
                    </div>
                  </template>
                  <template if:true={hasEntityUiElements}>
                    <div class="kb-entity-group">
                      <span class="kb-entity-group__label">UI Elements:</span>
                      <template for:each={entityUiElements} for:item="entity">
                        <span key={entity} class="kb-entity-pill kb-entity-pill--ui">{entity}</span>
                      </template>
                    </div>
                  </template>
                  <template if:true={hasEntityApiNames}>
                    <div class="kb-entity-group">
                      <span class="kb-entity-group__label">API Names:</span>
                      <template for:each={entityApiNames} for:item="entity">
                        <span key={entity} class="kb-entity-pill kb-entity-pill--api">{entity}</span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <template if:false={hasApprovedEnrichment}>
              <div class="kb-empty-state">
                <lightning-icon icon-name="utility:einstein" size="small" alternative-text="AI"></lightning-icon>
                <div class="kb-empty-state__text">No enrichment generated yet.</div>
                <div class="kb-empty-state__hint">Click <strong>Enrich</strong> in the header to generate an AI abstract, FAQ questions, and extracted entities.</div>
              </div>
            </template>
          </div>
        </section>
      </div>

      <!-- Right: Feed Panel -->
      <aside class="kb-feed">
        <div class="kb-feed__header">
          <ul class="kb-feed__tabs">
            <li class="kb-feed__tab kb-feed__tab--active">Feed</li>
          </ul>
        </div>

        <div class="kb-feed__toolbar">
          <lightning-button-icon icon-name="utility:filter" variant="bare" size="small" alternative-text="Filter"></lightning-button-icon>
          <div class="kb-feed__search">
            <lightning-input type="search" variant="label-hidden" placeholder="Search this feed..." class="kb-feed__search-input"></lightning-input>
          </div>
          <lightning-button-icon icon-name="utility:refresh" variant="bare" size="small" alternative-text="Refresh"></lightning-button-icon>
        </div>

        <div class="kb-feed__items">
          <div class="kb-feed__item">
            <div class="kb-feed__avatar"></div>
            <div class="kb-feed__content">
              <div class="kb-feed__meta">
                <a href="#" class="kb-feed__user">Nimit Khurana</a>
                <span class="kb-feed__action">unpublished this Knowledge.</span>
              </div>
              <div class="kb-feed__time">May 10, 2026 at 7:10 AM</div>
              <div class="kb-feed__actions">
                <a href="#" class="kb-feed__action-link">
                  <lightning-icon icon-name="utility:like" size="x-small" alternative-text="Like"></lightning-icon>
                  Like
                </a>
                <a href="#" class="kb-feed__action-link">
                  <lightning-icon icon-name="utility:comments" size="x-small" alternative-text="Comment"></lightning-icon>
                  Comment
                </a>
              </div>
              <div class="kb-feed__comment-box">
                <div class="kb-feed__avatar kb-feed__avatar--small"></div>
                <lightning-input type="text" variant="label-hidden" placeholder="Write a comment..." class="kb-feed__comment-input"></lightning-input>
              </div>
            </div>
          </div>

          <div class="kb-feed__item">
            <div class="kb-feed__avatar"></div>
            <div class="kb-feed__content">
              <div class="kb-feed__meta">
                <a href="#" class="kb-feed__user">Nimit Khurana</a>
                <span class="kb-feed__action">published this new Knowledge.</span>
              </div>
              <div class="kb-feed__time">May 10, 2026 at 7:10 AM</div>
              <div class="kb-feed__actions">
                <a href="#" class="kb-feed__action-link">
                  <lightning-icon icon-name="utility:like" size="x-small" alternative-text="Like"></lightning-icon>
                  Like
                </a>
                <a href="#" class="kb-feed__action-link">
                  <lightning-icon icon-name="utility:comments" size="x-small" alternative-text="Comment"></lightning-icon>
                  Comment
                </a>
              </div>
              <div class="kb-feed__comment-box">
                <div class="kb-feed__avatar kb-feed__avatar--small"></div>
                <lightning-input type="text" variant="label-hidden" placeholder="Write a comment..." class="kb-feed__comment-input"></lightning-input>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- AI Feature Modals -->
  <template if:true={isAnyModalOpen}>
    <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
      <div class="slds-modal__container kb-ai-modal">
        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseModal} title="Close">
          <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
        </button>

        <header class="slds-modal__header">
          <h2 class="slds-modal__title slds-hyphenate">
            <template if:true={isAnalyzeModalOpen}>AI Analysis</template>
            <template if:true={isMetadataModalOpen}>AI Metadata Suggestions</template>
            <template if:true={isEnrichModalOpen}>AI Enrichment</template>
            <template if:true={isDashboardModalOpen}>Knowledge Health Dashboard</template>
          </h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium kb-ai-modal__content">
          <template if:true={isAnalyzeModalOpen}>
            <page-article-analyzer onnavigate={handleNavigate}></page-article-analyzer>
          </template>
          <template if:true={isMetadataModalOpen}>
            <page-metadata-suggester onnavigate={handleNavigate}></page-metadata-suggester>
          </template>
          <template if:true={isEnrichModalOpen}>
            <page-enrichment-preview onnavigate={handleNavigate}></page-enrichment-preview>
          </template>
          <template if:true={isDashboardModalOpen}>
            <page-health-dashboard onnavigate={handleNavigate}></page-health-dashboard>
          </template>
        </div>

        <footer class="slds-modal__footer">
          <lightning-button label="Close" onclick={handleCloseModal}></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Edit Modal with AI Guided Author Panel -->
  <template if:true={isEditModalOpen}>
    <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
      <div class="slds-modal__container kb-edit-modal">
        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleEditClose} title="Close">
          <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
        </button>

        <header class="slds-modal__header">
          <h2 class="slds-modal__title slds-hyphenate">Edit {editTitle}</h2>
        </header>

        <div class="slds-modal__content kb-edit-modal__content">
          <div class="kb-edit-modal__required-info">
            <span class="slds-text-color_destructive">*</span> = Required Information
          </div>

          <div class="kb-edit-modal__layout">
            <!-- Left: Edit Form (60%) -->
            <div class="kb-edit-modal__form">

              <!-- Information Section -->
              <div class="kb-edit-section">
                <div class="kb-edit-section__header">Information</div>
                <div class="kb-edit-section__body">
                  <lightning-input
                    type="text"
                    label="Title"
                    required
                    value={editTitle}
                    onchange={handleTitleChange}
                    class="slds-m-bottom_medium">
                  </lightning-input>

                  <lightning-textarea
                    label="Summary"
                    field-level-help="A brief summary used for search results"
                    value={editSummary}
                    onchange={handleSummaryChange}
                    class="slds-m-bottom_medium">
                  </lightning-textarea>
                </div>
              </div>

              <!-- Details Section -->
              <div class="kb-edit-section">
                <div class="kb-edit-section__header">Details</div>
                <div class="kb-edit-section__body">
                  <div class="kb-edit-rte-label">Details</div>
                  <div class="kb-edit-rte">
                    <div class="kb-edit-rte__toolbar">
                      <span class="kb-edit-rte__menu">File</span>
                      <span class="kb-edit-rte__menu">Edit</span>
                      <span class="kb-edit-rte__menu">Insert</span>
                      <span class="kb-edit-rte__menu">View</span>
                      <span class="kb-edit-rte__menu">Format</span>
                      <span class="kb-edit-rte__menu">Table</span>
                      <span class="kb-edit-rte__menu">Tools</span>
                      <span class="kb-edit-rte__menu">Help</span>
                    </div>
                    <lightning-textarea
                      variant="label-hidden"
                      label="Details"
                      value={editDetails}
                      onchange={handleDetailsChange}
                      class="kb-edit-rte__textarea">
                    </lightning-textarea>
                  </div>

                  <div class="kb-edit-rte-label slds-m-top_medium">Internal Comments</div>
                  <div class="kb-edit-rte">
                    <div class="kb-edit-rte__toolbar">
                      <span class="kb-edit-rte__menu">File</span>
                      <span class="kb-edit-rte__menu">Edit</span>
                      <span class="kb-edit-rte__menu">Insert</span>
                      <span class="kb-edit-rte__menu">View</span>
                      <span class="kb-edit-rte__menu">Format</span>
                      <span class="kb-edit-rte__menu">Table</span>
                      <span class="kb-edit-rte__menu">Tools</span>
                      <span class="kb-edit-rte__menu">Help</span>
                    </div>
                    <lightning-textarea
                      variant="label-hidden"
                      label="Internal Comments"
                      value={editInternalComments}
                      onchange={handleInternalCommentsChange}
                      class="kb-edit-rte__textarea kb-edit-rte__textarea--small">
                    </lightning-textarea>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: AI Guided Author Panel (40%) -->
            <aside class="kb-edit-modal__ai-panel">
              <div class="kb-ai-panel__header">
                <lightning-icon icon-name="utility:einstein" size="small" variant="inverse"></lightning-icon>
                <span>AI Guided Author</span>
              </div>

              <div class="kb-ai-panel__body">
                <!-- RAG Score -->
                <div class={editRagScoreClass}>
                  <div class="kb-ai-score__label">RAG Score</div>
                  <div class="kb-ai-score__value">{editScoreDisplay}</div>
                  <div class="kb-ai-score__sublabel">{editScoreLabel}</div>
                </div>

                <!-- Structure Checks -->
                <div class="kb-ai-panel__section">
                  <div class="kb-ai-panel__section-title">Structure Checks</div>
                  <ul class="kb-ai-checks">
                    <template for:each={editStructureChecks} for:item="check">
                      <li key={check.key} class="kb-ai-checks__item">
                        <lightning-icon
                          icon-name={check.iconName}
                          size="x-small"
                          variant={check.variant}>
                        </lightning-icon>
                        <span>{check.label}</span>
                      </li>
                    </template>
                  </ul>
                </div>

                <!-- Issues Found -->
                <template if:true={editHasViolations}>
                  <div class="kb-ai-panel__section">
                    <div class="kb-ai-panel__section-title">Issues Found</div>
                    <ul class="kb-ai-issues">
                      <template for:each={editViolations} for:item="violation" for:index="idx">
                        <li key={violation.message} class="kb-ai-issues__item">
                          <lightning-icon
                            icon-name="utility:warning"
                            size="x-small"
                            variant="warning">
                          </lightning-icon>
                          <div>
                            <div class="kb-ai-issues__message">{violation.message}</div>
                            <template if:true={violation.suggestion}>
                              <div class="kb-ai-issues__suggestion">→ {violation.suggestion}</div>
                            </template>
                          </div>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>

                <!-- Writing Tips -->
                <div class="kb-ai-panel__section">
                  <div class="kb-ai-panel__section-title">Writing Tips</div>
                  <ul class="kb-ai-tips">
                    <template for:each={editWritingTips} for:item="tip">
                      <li key={tip} class="kb-ai-tips__item">{tip}</li>
                    </template>
                  </ul>
                </div>
              </div>
            </aside>
          </div>
        </div>

        <footer class="slds-modal__footer">
          <lightning-button label="Cancel" onclick={handleEditClose}></lightning-button>
          <lightning-button label="Save & New" class="slds-m-left_x-small"></lightning-button>
          <lightning-button label="Save" variant="brand" onclick={handleEditSave} class="slds-m-left_x-small"></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
