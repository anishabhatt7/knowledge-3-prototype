<template lwc:render-mode="light">
    <div class="ka-page">
        <!-- ═══ LEFT RAIL — same shape as the other Knowledge 3.0 pages ═══ -->
        <nav class={railClass} aria-label="Knowledge navigation">
            <div class="kh-rail__top">
                <template for:each={railTopItems} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Maintain</div>
                <template for:each={railMaintainComputed} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Create</div>
                <template for:each={railCreate} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class="kh-rail__row"
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>
            </div>

            <div class="kh-rail__bottom">
                <button
                    type="button"
                    class="kh-rail__row kh-rail__row--collapse"
                    aria-label={collapseAriaLabel}
                    onclick={handleToggleRail}
                >
                    <lightning-icon
                        icon-name={collapseIconName}
                        size="x-small"
                        alternative-text={collapseAriaLabel}
                        class="kh-rail__icon"
                    ></lightning-icon>
                    <span class="kh-rail__label">Collapse</span>
                </button>
            </div>
        </nav>

        <!-- ═══ MAIN CONTENT ═══ -->
        <main class="ka-main">
            <template lwc:if={hasSelection}>
                <!-- ▰▰ DETAIL VIEW ▰▰ -->
                <div class="ka-detail">
                    <button
                        type="button"
                        class="ka-detail__back"
                        onclick={handleBackToList}
                    >
                        <lightning-icon
                            icon-name="utility:back"
                            size="xx-small"
                            alternative-text=""
                        ></lightning-icon>
                        <span>All Agents</span>
                    </button>

                    <header class="ka-detail__header">
                        <div class="ka-detail__avatar">{detail.avatar}</div>
                        <div class="ka-detail__title-block">
                            <div class="ka-detail__title-row">
                                <h1 class="ka-detail__title">{detail.name}</h1>
                                <lightning-badge
                                    label={detail.statusLabel}
                                    class={detail.statusClass}
                                ></lightning-badge>
                                <lightning-badge
                                    label={detail.govLabel}
                                    class={detail.govClass}
                                ></lightning-badge>
                            </div>
                            <p class="ka-detail__domain">{detail.domain} Domain</p>
                        </div>
                        <div class={detail.healthClass}>
                            <span class="ka-health__value">{detail.healthScore}</span>
                            <span class="ka-health__label">{detail.healthLabel}</span>
                        </div>
                    </header>

                    <div class="ka-detail-row">
                        <!-- Activity Timeline -->
                        <section class="ka-detail__col ka-detail__col--timeline">
                            <h3 class="ka-detail__section-title">Activity Timeline</h3>
                            <div class="ka-activity-list">
                                <template for:each={activityItems} for:item="act">
                                    <div key={act.id} class="ka-activity">
                                        <div class={act.iconClass}>
                                            <lightning-icon
                                                icon-name={act.iconName}
                                                size="xx-small"
                                                alternative-text={act.type}
                                            ></lightning-icon>
                                        </div>
                                        <div class="ka-activity__body">
                                            <p class="ka-activity__desc">{act.description}</p>
                                            <template lwc:if={act.entityTitle}>
                                                <a class="ka-activity__entity" href="#">{act.entityTitle}</a>
                                            </template>
                                            <span class="ka-activity__time">{act.timeLabel}</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </section>

                        <!-- Domain Health -->
                        <section class="ka-detail__col ka-detail__col--health">
                            <h3 class="ka-detail__section-title">Domain Health</h3>

                            <div class="ka-bar">
                                <div class="ka-bar__head">
                                    <span class="ka-bar__label">Coverage</span>
                                    <span class="ka-bar__value">{detail.coveragePercent}%</span>
                                </div>
                                <div class="ka-bar__track">
                                    <div class="ka-bar__fill" style={detail.coverageStyle}></div>
                                </div>
                            </div>
                            <div class="ka-bar">
                                <div class="ka-bar__head">
                                    <span class="ka-bar__label">Freshness</span>
                                    <span class="ka-bar__value">{detail.freshnessPercent}%</span>
                                </div>
                                <div class="ka-bar__track">
                                    <div class="ka-bar__fill" style={detail.freshnessStyle}></div>
                                </div>
                            </div>

                            <div class="ka-stats">
                                <div class="ka-stats__row">
                                    <span class="ka-stats__label">Contradictions Found</span>
                                    <span class="ka-stats__value">{detail.contradictionsFound}</span>
                                </div>
                                <div class="ka-stats__row">
                                    <span class="ka-stats__label">Articles Created</span>
                                    <span class="ka-stats__value">{detail.articlesCreated}</span>
                                </div>
                                <div class="ka-stats__row">
                                    <span class="ka-stats__label">Articles Updated</span>
                                    <span class="ka-stats__value">{detail.articlesUpdated}</span>
                                </div>
                                <div class="ka-stats__row">
                                    <span class="ka-stats__label">Gaps Identified</span>
                                    <span class="ka-stats__value">{detail.gapsIdentified}</span>
                                </div>
                            </div>
                        </section>

                        <!-- Signals + Governance -->
                        <section class="ka-detail__col ka-detail__col--sources">
                            <div class="ka-detail__card">
                                <h3 class="ka-detail__section-title">Signal Sources</h3>
                                <div class="ka-signals">
                                    <template for:each={signalSources} for:item="src">
                                        <div key={src.key} class="ka-signals__row">
                                            <span class="ka-signals__dot"></span>
                                            <span class="ka-signals__label">{src.label}</span>
                                            <span class="ka-signals__status">Connected</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div class={detail.govBlockClass}>
                                <h3 class="ka-detail__section-title">Governance: {detail.govLabel}</h3>
                                <p class="ka-detail__gov-desc">{detail.govDescription}</p>
                            </div>
                        </section>
                    </div>

                    <!-- Secondary detail cards (cross-domain, coordination, predicted needs, feedback) -->
                    <div class="ka-detail-row ka-detail-row--secondary">
                        <template lwc:if={crossDomainLinks.length}>
                            <section class="ka-detail__card ka-detail__card--half">
                                <h3 class="ka-detail__section-title">
                                    <lightning-icon icon-name="utility:world" size="xx-small" alternative-text=""></lightning-icon>
                                    Cross-Domain Links
                                </h3>
                                <div class="ka-list">
                                    <template for:each={crossDomainLinks} for:item="link">
                                        <div key={link.key} class="ka-list__row">
                                            <span class="ka-list__title">{link.targetDomain}</span>
                                            <span class="ka-pill">{link.linkCount}</span>
                                            <span class="ka-list__meta">{link.relationship}</span>
                                        </div>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <template lwc:if={coordinationEvents.length}>
                            <section class="ka-detail__card ka-detail__card--half">
                                <h3 class="ka-detail__section-title">
                                    <lightning-icon icon-name="utility:people" size="xx-small" alternative-text=""></lightning-icon>
                                    Agent Coordination
                                </h3>
                                <div class="ka-list">
                                    <template for:each={coordinationEvents} for:item="evt">
                                        <div key={evt.key} class="ka-list__row">
                                            <span class="ka-list__title">{evt.partnerAgent}</span>
                                            <a class="ka-list__link" href="#">{evt.sharedEntity}</a>
                                            <span class={evt.statusClass}>{evt.status}</span>
                                            <span class="ka-list__time">{evt.timeLabel}</span>
                                        </div>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <template lwc:if={predictedNeeds.length}>
                            <section class="ka-detail__card ka-detail__card--half">
                                <h3 class="ka-detail__section-title">
                                    <lightning-icon icon-name="utility:target" size="xx-small" alternative-text=""></lightning-icon>
                                    Predicted Knowledge Needs
                                </h3>
                                <div class="ka-list">
                                    <template for:each={predictedNeeds} for:item="need">
                                        <div key={need.key} class="ka-need">
                                            <div class="ka-need__head">
                                                <span class="ka-need__topic">{need.topic}</span>
                                                <div class="ka-need__bar">
                                                    <div class="ka-need__bar-fill" style={need.confidenceStyle}></div>
                                                </div>
                                                <template lwc:if={need.dueLabel}>
                                                    <span class={need.dueClass}>{need.dueLabel}</span>
                                                </template>
                                            </div>
                                            <p class="ka-need__source">{need.source}</p>
                                        </div>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <template lwc:if={feedback}>
                            <section class="ka-detail__card ka-detail__card--half">
                                <h3 class="ka-detail__section-title">
                                    <lightning-icon icon-name="utility:trending" size="xx-small" alternative-text=""></lightning-icon>
                                    Learning from Feedback
                                </h3>
                                <p class="ka-feedback__total">
                                    Total reviewed: <strong>{feedback.total}</strong>
                                </p>
                                <template lwc:if={feedback.hasData}>
                                    <div class="ka-feedback__stack">
                                        <template lwc:if={feedback.hasAccepted}>
                                            <div class="ka-feedback__seg ka-feedback__seg--accepted" style={feedback.acceptedStyle}></div>
                                        </template>
                                        <template lwc:if={feedback.hasModified}>
                                            <div class="ka-feedback__seg ka-feedback__seg--modified" style={feedback.modifiedStyle}></div>
                                        </template>
                                        <template lwc:if={feedback.hasRejected}>
                                            <div class="ka-feedback__seg ka-feedback__seg--rejected" style={feedback.rejectedStyle}></div>
                                        </template>
                                    </div>
                                    <p class="ka-feedback__rate">
                                        Acceptance rate: <strong>{feedback.acceptanceRate}%</strong>
                                    </p>
                                    <template lwc:if={feedback.showTrend}>
                                        <svg class="ka-feedback__trend" viewBox="0 0 160 32" preserveAspectRatio="none">
                                            <polyline points={feedback.trendPoints} fill="none" stroke="#0250d9" stroke-width="2"></polyline>
                                        </svg>
                                    </template>
                                </template>
                            </section>
                        </template>
                    </div>
                </div>
            </template>

            <template lwc:else>
                <!-- ▰▰ LIST VIEW — Figma 78:10164 ▰▰ -->
                <header class="ka-page-header">
                    <div class="ka-page-header__left">
                        <lightning-icon
                            icon-name="standard:agent_astro"
                            size="medium"
                            alternative-text="Knowledge Agents"
                            class="ka-page-header__icon"
                        ></lightning-icon>
                        <h1 class="ka-page-header__title">Knowledge Agents</h1>
                    </div>
                    <div class="ka-page-header__actions">
                        <lightning-button
                            variant="neutral"
                            label="New"
                            title="Create a new Knowledge Agent"
                            onclick={handleNewAgent}
                            class="ka-btn-new"
                        ></lightning-button>
                    </div>
                </header>

                <div class="ka-toolbar">
                    <p class="ka-toolbar__meta">{itemCountLabel}</p>
                    <div class="ka-toolbar__controls">
                        <div class="ka-toolbar__search">
                            <lightning-input
                                type="search"
                                placeholder="Search…"
                                variant="label-hidden"
                                label="Search"
                            ></lightning-input>
                        </div>
                        <lightning-button-icon
                            icon-name="utility:settings"
                            variant="border-filled"
                            size="medium"
                            alternative-text="Settings"
                            class="ka-toolbar__icon-btn"
                        ></lightning-button-icon>
                        <lightning-button-icon
                            icon-name="utility:table"
                            variant="border-filled"
                            size="medium"
                            alternative-text="Display as"
                            class="ka-toolbar__icon-btn"
                        ></lightning-button-icon>
                        <lightning-button-icon
                            icon-name="utility:edit"
                            variant="border-filled"
                            size="medium"
                            alternative-text="Edit"
                            class="ka-toolbar__icon-btn"
                        ></lightning-button-icon>
                        <lightning-button-icon
                            icon-name="utility:refresh"
                            variant="border-filled"
                            size="medium"
                            alternative-text="Refresh"
                            class="ka-toolbar__icon-btn"
                        ></lightning-button-icon>
                        <lightning-button-group class="ka-toolbar__pill">
                            <lightning-button-icon
                                icon-name="utility:chart"
                                variant="border-filled"
                                size="medium"
                                alternative-text="Charts"
                            ></lightning-button-icon>
                            <lightning-button-icon
                                icon-name="utility:filterList"
                                variant="border-filled"
                                size="medium"
                                alternative-text="Filters"
                            ></lightning-button-icon>
                        </lightning-button-group>
                    </div>
                </div>

                <!-- SLDS2 Data Table blueprint (slds-table + bordered).
                     Header cells follow the SLDS 2 "⚡ Header cell"
                     component (Figma 78:7300) — sentence-case label
                     inside a flex inner wrapper that draws the vertical
                     column divider. Body cells follow the matching
                     "⚡ Cell" component (Figma 78:6888). Rows use
                     slds-hint-parent so the chevron can hide until hover. -->
                <div class="ka-table-wrap">
                    <table
                        role="grid"
                        aria-label="Knowledge Agents"
                        class="slds-table slds-table_bordered slds-table_cell-buffer ka-table"
                    >
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col" class="ka-th">
                                    <div class="ka-th__inner">
                                        <span class="ka-th__label" title="Agent Name">Agent Name</span>
                                    </div>
                                </th>
                                <th scope="col" class="ka-th">
                                    <div class="ka-th__inner">
                                        <span class="ka-th__label" title="Status">Status</span>
                                    </div>
                                </th>
                                <th scope="col" class="ka-th">
                                    <div class="ka-th__inner">
                                        <span class="ka-th__label" title="Governance">Governance</span>
                                    </div>
                                </th>
                                <th scope="col" class="ka-th">
                                    <div class="ka-th__inner">
                                        <span class="ka-th__label" title="Activity">Activity</span>
                                    </div>
                                </th>
                                <th scope="col" class="ka-th">
                                    <div class="ka-th__inner">
                                        <span class="ka-th__label" title="Signal Sources">Signal Sources</span>
                                    </div>
                                </th>
                                <th
                                    scope="col"
                                    aria-sort="descending"
                                    class="ka-th ka-th--sortable slds-is-sortable slds-is-sorted slds-is-sorted_desc ka-th-health"
                                >
                                    <span class="slds-th__action slds-text-link_reset ka-th__inner" role="button" tabindex="0">
                                        <span class="slds-assistive-text">Sort by: </span>
                                        <span class="ka-th__label" title="Health">Health</span>
                                        <lightning-icon
                                            icon-name="utility:arrowdown"
                                            size="xx-small"
                                            alternative-text="Sorted descending"
                                            class="ka-th-health__icon"
                                        ></lightning-icon>
                                    </span>
                                </th>
                                <th scope="col" class="ka-th ka-th-actions" aria-label="Row actions">
                                    <div class="ka-th__inner"></div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={tableRows} for:item="row">
                                <tr key={row.id} class="slds-hint-parent">
                                    <th scope="row" data-label="Agent Name" class="ka-td ka-cell-name">
                                        <div class="ka-td__inner">
                                            <button
                                                type="button"
                                                class="ka-table__link"
                                                data-id={row.id}
                                                onclick={handleSelectAgent}
                                                onkeydown={handleSelectAgentKeyDown}
                                            >{row.name}</button>
                                        </div>
                                    </th>
                                    <td role="gridcell" data-label="Status" class="ka-td">
                                        <div class="ka-td__inner">
                                            <lightning-badge
                                                label={row.statusLabel}
                                                class={row.statusClass}
                                            ></lightning-badge>
                                        </div>
                                    </td>
                                    <td role="gridcell" data-label="Governance" class="ka-td">
                                        <div class="ka-td__inner">
                                            <lightning-badge
                                                label={row.govLabel}
                                                class={row.govClass}
                                            ></lightning-badge>
                                        </div>
                                    </td>
                                    <td role="gridcell" data-label="Activity" class="ka-td">
                                        <div class="ka-td__inner">
                                            <span class="ka-table-activity">
                                                <span class="ka-table-activity__seg">
                                                    <strong>{row.articlesCreated}</strong>
                                                    <span>created</span>
                                                </span>
                                                <span class="ka-table-activity__seg">
                                                    <strong>{row.articlesUpdated}</strong>
                                                    <span>updated</span>
                                                </span>
                                                <span class="ka-table-activity__seg ka-table-activity__seg--gaps">
                                                    <strong>{row.gapsIdentified}</strong>
                                                    <span>gaps</span>
                                                </span>
                                            </span>
                                        </div>
                                    </td>
                                    <td role="gridcell" data-label="Signal Sources" class="ka-td">
                                        <div class="ka-td__inner">
                                            <span class="ka-signal-chips">
                                                <template for:each={row.signalChips} for:item="chip">
                                                    <span key={chip.key} class="ka-signal-chip">{chip.label}</span>
                                                </template>
                                            </span>
                                        </div>
                                    </td>
                                    <td role="gridcell" data-label="Health" class="ka-td ka-cell-health">
                                        <div class="ka-td__inner">
                                            <span class={row.healthClass}>{row.healthScore}</span>
                                        </div>
                                    </td>
                                    <td role="gridcell" class="ka-td ka-cell-actions">
                                        <div class="ka-td__inner">
                                            <lightning-button-icon
                                                icon-name="utility:chevrondown"
                                                variant="border-filled"
                                                size="xx-small"
                                                alternative-text="Open agent"
                                                title="Open agent"
                                                data-id={row.id}
                                                onclick={handleSelectAgent}
                                                class="ka-row-action"
                                            ></lightning-button-icon>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </main>
    </div>
</template>
