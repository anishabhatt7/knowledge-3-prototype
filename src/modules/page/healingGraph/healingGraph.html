<template lwc:render-mode="light">
    <div class="hg-page">
        <!-- ═══ LEFT RAIL — same as Knowledge Home ═══ -->
        <nav class={railClass} aria-label="Knowledge navigation">
            <div class="kh-rail__top">
                <template for:each={railTopItems} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Maintain</div>
                <template for:each={railMaintainComputed} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class={item.rowClass}
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>

                <div class="kh-rail__divider" role="separator"></div>
                <div class="kh-rail__group-header">Create</div>
                <template for:each={railCreate} for:item="item">
                    <button
                        key={item.id}
                        type="button"
                        class="kh-rail__row"
                        data-id={item.id}
                        onclick={handleRailNav}
                    >
                        <lightning-icon
                            icon-name={item.icon}
                            size="x-small"
                            alternative-text={item.label}
                            class="kh-rail__icon"
                        ></lightning-icon>
                        <span class="kh-rail__label">{item.label}</span>
                    </button>
                </template>
            </div>

            <div class="kh-rail__bottom">
                <button
                    type="button"
                    class="kh-rail__row kh-rail__row--collapse"
                    aria-label={collapseAriaLabel}
                    onclick={handleToggleRail}
                >
                    <lightning-icon
                        icon-name={collapseIconName}
                        size="x-small"
                        alternative-text={collapseAriaLabel}
                        class="kh-rail__icon"
                    ></lightning-icon>
                    <span class="kh-rail__label">Collapse</span>
                </button>
            </div>
        </nav>

        <!-- ═══ MAIN CONTENT ═══ -->
        <div class="hg-shell">
            <!-- Header bar -->
            <header class="hg-header">
            <div class="hg-header__left">
                <span class="hg-header__icon" aria-hidden="true">
                    <lightning-icon icon-name="standard:lightning_usage" size="medium" alternative-text=""></lightning-icon>
                </span>
                <div class="hg-header__title-block">
                    <h1 class="hg-header__title">Knowledge Health</h1>
                    <span class="hg-header__stats">{headerSubtitle}</span>
                </div>
            </div>
            <div class="hg-header__right">
                <template lwc:if={_graphView}>
                    <button type="button" class={healthBtnClass} onclick={handleToggleHealthBar}>
                        <lightning-icon icon-name="utility:heart" size="xx-small" alternative-text=""></lightning-icon>
                        <span>Health</span>
                    </button>
                    <lightning-combobox
                        class="hg-combobox"
                        variant="label-hidden"
                        label="Filter by status"
                        name="healing-filter"
                        value={_healingFilter}
                        options={healingComboboxOptions}
                        onchange={handleHealingFilterChange}
                    ></lightning-combobox>
                </template>
                <template lwc:else>
                    <lightning-input
                        class="hg-search"
                        type="search"
                        variant="label-hidden"
                        label="Search knowledge health"
                        placeholder="Search..."
                    ></lightning-input>
                </template>
                <label class="hg-viewtoggle">
                    <span class="hg-viewtoggle__label">Graph View</span>
                    <lightning-input
                        type="toggle"
                        variant="label-hidden"
                        label="Graph View"
                        message-toggle-active=""
                        message-toggle-inactive=""
                        checked={_graphView}
                        onchange={handleToggleGraphView}
                    ></lightning-input>
                </label>
            </div>
        </header>

        <!-- ═══ GRAPH VIEW (toggled on) ═══ -->
        <template lwc:if={_graphView}>
        <!-- Health domain bar -->
        <template lwc:if={_showHealthBar}>
            <div class="hg-health-bar">
                <button type="button" class={allDomainBtnClass} onclick={handleDomainAllClick}>
                    <span class="hg-domain-chip__label">All</span>
                </button>
                <template for:each={healthDomainsComputed} for:item="dom">
                    <button key={dom.domain} type="button" class={dom.chipClass} data-domain={dom.domain} onclick={handleDomainClick}>
                        <span class="hg-health-ring" data-score={dom.healthScore}></span>
                        <span class="hg-domain-chip__info">
                            <span class="hg-domain-chip__label">{dom.domain}</span>
                            <span class="hg-domain-chip__meta">{dom.contradictionCount} conflicts &middot; {dom.orphanCount} orphans</span>
                        </span>
                    </button>
                </template>
            </div>
        </template>

        <!-- Capability filter panel -->
        <template lwc:if={_showFilters}>
            <div class="hg-filter-panel">
                <div class="hg-filter-panel__head">
                    <span class="hg-filter-panel__title">Capabilities</span>
                    <template lwc:if={activeFilterCount}>
                        <button type="button" class="hg-filter-panel__clear" onclick={handleClearFilters}>Clear all</button>
                    </template>
                </div>
                <div class="hg-filter-panel__list">
                    <template for:each={capabilityFilterItems} for:item="cap">
                        <button key={cap.key} type="button" class={cap.rowClass} data-cap={cap.key} onclick={handleToggleCapability}>
                            <span class="hg-cap-dot" style={cap.dotStyle}></span>
                            <span class="hg-cap-label">{cap.label}</span>
                            <span class="hg-cap-count">{cap.count}</span>
                        </button>
                    </template>
                </div>
            </div>
        </template>

        <!-- Legend -->
        <div class="hg-legend">
            <template for:each={legendCapabilities} for:item="cap">
                <div key={cap.key} class="hg-legend__item">
                    <span class="hg-legend__dot" style={cap.dotStyle}></span>
                    <span class="hg-legend__text">{cap.label}</span>
                </div>
            </template>
            <span class="hg-legend__sep"></span>
            <div class="hg-legend__item">
                <span class="hg-legend__conflict-line"></span>
                <span class="hg-legend__text">Conflict</span>
            </div>
            <div class="hg-legend__item">
                <span class="hg-legend__ring hg-legend__ring--healed"></span>
                <span class="hg-legend__text">Healed</span>
            </div>
            <div class="hg-legend__item">
                <span class="hg-legend__ring hg-legend__ring--pending"></span>
                <span class="hg-legend__text">Pending</span>
            </div>
            <div class="hg-legend__item">
                <span class="hg-legend__ring hg-legend__ring--escalated"></span>
                <span class="hg-legend__text">Escalated</span>
            </div>
        </div>

        <!-- Hovered node tooltip -->
        <template lwc:if={showTooltip}>
            <div class="hg-tooltip">
                <div class="hg-tooltip__head">
                    <span class="hg-tooltip__dot" style={tooltipDotStyle}></span>
                    <span class="hg-tooltip__name">{_hoveredInfo.label}</span>
                </div>
                <div class="hg-tooltip__meta">
                    <span>{_hoveredInfo.type}</span>
                    <span>&middot;</span>
                    <span>{_hoveredInfo.capLabel}</span>
                    <span>&middot;</span>
                    <span>{_hoveredInfo.connectionCount} connections</span>
                </div>
                <template lwc:if={_hoveredInfo.inContradiction}>
                    <div class="hg-tooltip__warn">Active contradiction</div>
                </template>
                <template lwc:if={_hoveredInfo.healingCount}>
                    <div class="hg-tooltip__heal">{_hoveredInfo.healingCount} healing action(s)</div>
                </template>
            </div>
        </template>

        <!-- SVG canvas -->
        <svg class="hg-svg"></svg>

        <!-- Detail side panel -->
        <template lwc:if={hasSelection}>
            <aside class="hg-panel">
                <div class="hg-panel__header">
                    <h2 class="hg-panel__title">{panelTitle}</h2>
                    <button type="button" class="hg-panel__close" onclick={handleClosePanel}>
                        <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Close"></lightning-icon>
                    </button>
                </div>
                <div class="hg-panel__body">
                    <!-- Contradiction detail — mirrors the dashboard
                         "Active Quality Issues" tile (clickable articles
                         open as records in a workspace tab, confidence
                         badge, and a "Pick this" action per option). -->
                    <template lwc:if={isContradictionSelected}>
                        <article class="hg-qi-tile hg-qi-tile--panel">
                            <div class="hg-qi-tile__head">
                                <div class="hg-qi-tile__head-left">
                                    <span class="hg-qi-tile__domain">{selectedContradiction.domain}</span>
                                    <lightning-badge label={selectedContradiction.typeBadgeLabel} class="hg-qi-type-badge slds-badge_lightest"></lightning-badge>
                                    <lightning-badge label={selectedContradiction.confidenceLabel} icon-name="utility:success" class="hg-qi-conf-badge slds-theme_success"></lightning-badge>
                                </div>
                                <div class="hg-qi-tile__head-actions">
                                    <lightning-button variant="brand-outline" label="Ignore Issue" onclick={handleIgnoreContradiction}></lightning-button>
                                </div>
                            </div>

                            <div class="hg-qi-tile__summary">
                                <p class="hg-qi-tile__summary-title">{selectedContradiction.title}</p>
                                <p class="hg-qi-tile__summary-text">{selectedContradiction.description}</p>
                            </div>

                            <div class="hg-qi-tile__columns">
                                <div class="hg-qi-col">
                                    <span class="hg-qi-col__label">Option A</span>
                                    <button type="button" class="hg-qi-col__article" data-id={selectedContradiction.itemA.articleId} data-title={selectedContradiction.itemA.articleTitle} onclick={handleOpenArticle}>
                                        <lightning-icon icon-name="utility:knowledge_base" size="xx-small" alternative-text="" class="hg-qi-col__article-icon"></lightning-icon>
                                        <span class="hg-qi-col__article-text">{selectedContradiction.itemA.articleTitle}</span>
                                    </button>
                                    <p class="hg-qi-col__text">{selectedContradiction.itemA.text}</p>
                                    <div class="hg-qi-col__footer">
                                        <lightning-button variant="brand-outline" label="Pick this" data-title={selectedContradiction.itemA.articleTitle} onclick={handlePickOption}></lightning-button>
                                    </div>
                                </div>

                                <div class="hg-qi-col">
                                    <span class="hg-qi-col__label">Option B</span>
                                    <button type="button" class="hg-qi-col__article" data-id={selectedContradiction.itemB.articleId} data-title={selectedContradiction.itemB.articleTitle} onclick={handleOpenArticle}>
                                        <lightning-icon icon-name="utility:knowledge_base" size="xx-small" alternative-text="" class="hg-qi-col__article-icon"></lightning-icon>
                                        <span class="hg-qi-col__article-text">{selectedContradiction.itemB.articleTitle}</span>
                                    </button>
                                    <p class="hg-qi-col__text">{selectedContradiction.itemB.text}</p>
                                    <div class="hg-qi-col__footer">
                                        <lightning-button variant="brand-outline" label="Pick this" data-title={selectedContradiction.itemB.articleTitle} onclick={handlePickOption}></lightning-button>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </template>

                    <!-- Node healing detail -->
                    <template lwc:if={isNodeHealingSelected}>
                        <div class="hg-healing">
                            <template lwc:if={_selectedElement.node}>
                                <div class="hg-healing__node-info">
                                    <span class="hg-healing__node-dot" style={healingNodeDotStyle}></span>
                                    <span class="hg-healing__node-label">{_selectedElement.node.label}</span>
                                    <span class="hg-healing__node-type">{_selectedElement.node.type}</span>
                                </div>
                            </template>
                            <div class="hg-healing__toolbar">
                                <p class="hg-healing__count">{healingActionCountLabel}</p>
                                <lightning-button variant="brand" label="Approve All Drafts" icon-name="utility:sparkles" size="small" onclick={handleApproveAllDrafts}></lightning-button>
                            </div>
                            <div class="hg-healing__list">
                                <template for:each={sortedHealingActions} for:item="action">
                                    <div key={action.id} class="hg-healing__item">
                                        <div class="hg-healing__item-head" data-action-id={action.id} onclick={handleToggleAction}>
                                            <lightning-icon icon-name={action.chevronIcon} size="xx-small" alternative-text="" class="hg-healing__chevron"></lightning-icon>
                                            <div class="hg-healing__item-info">
                                                <p class="hg-healing__item-title">{action.entityTitle}</p>
                                                <div class="hg-healing__badges">
                                                    <span class={action.issueClass}>{action.issueType}</span>
                                                    <span class={action.actionClass}>{action.actionType}</span>
                                                    <span class="hg-healing__time">{action.timeLabel}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <template lwc:if={action.isExpanded}>
                                            <div class="hg-healing__detail">
                                                <p class="hg-healing__desc">{action.description}</p>
                                                <div class="hg-diff">
                                                    <div class="hg-diff__before">
                                                        <span class="hg-diff__label">Before</span>
                                                        <p class="hg-diff__text">{action.before}</p>
                                                    </div>
                                                    <div class="hg-diff__after">
                                                        <span class="hg-diff__label">After</span>
                                                        <p class="hg-diff__text">{action.after}</p>
                                                    </div>
                                                </div>
                                                <div class="hg-healing__meta">
                                                    <span>Trigger: {action.triggerSource}</span>
                                                    <template lwc:if={action.reviewedBy}>
                                                        <span>Reviewed by: {action.reviewedBy}</span>
                                                    </template>
                                                </div>
                                                <div class="hg-healing__item-actions">
                                                    <lightning-button variant="brand" label="Approve Draft" icon-name="utility:sparkles" size="small" data-title={action.entityTitle} onclick={handleApproveDraftAction}></lightning-button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </aside>
        </template>
        </template>

        <!-- ═══ DASHBOARD VIEW (default) ═══ -->
        <template lwc:else>
            <div class="hg-dashboard">
                <div class="hg-dash-grid">
                    <template for:each={domainCards} for:item="card">
                        <article
                            key={card.id}
                            class={card.cardClass}
                            role="button"
                            tabindex="0"
                            aria-pressed={card.selected}
                            data-domain={card.domain}
                            onclick={handleDomainCardClick}
                            onkeydown={handleDomainCardKeydown}
                        >
                            <p class="hg-dash-card__title">{card.domain}</p>

                            <div class="hg-dash-card__content">
                                <div class="hg-dash-card__overall-group">
                                    <div class="hg-dash-card__overall">
                                        <span class="hg-dash-card__pct">{card.overallLabel}</span>
                                        <span class="hg-dash-card__trend">Overall Health trending {card.trend}</span>
                                    </div>
                                    <lightning-progress-bar
                                        class={card.progressClass}
                                        value={card.overall}
                                        size="large"
                                    ></lightning-progress-bar>
                                </div>

                                <div class="hg-dash-card__metrics">
                                    <div class="hg-dash-metric-col">
                                        <div class="hg-dash-metric">
                                            <span class="hg-dash-metric__label">Accuracy</span>
                                            <span class="hg-dash-metric__value">{card.accuracyLabel}</span>
                                        </div>
                                        <div class="hg-dash-metric">
                                            <span class="hg-dash-metric__label">Compliance</span>
                                            <span class="hg-dash-metric__value">{card.complianceLabel}</span>
                                        </div>
                                    </div>
                                    <div class="hg-dash-metric-col">
                                        <div class="hg-dash-metric">
                                            <span class="hg-dash-metric__label">Metadata</span>
                                            <span class="hg-dash-metric__value">{card.metadataLabel}</span>
                                        </div>
                                        <div class="hg-dash-metric">
                                            <span class="hg-dash-metric__label">Structure/Clarity</span>
                                            <span class="hg-dash-metric__value">{card.structureLabel}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="hg-dash-card__footer">
                                <span class="hg-dash-card__hitl-label">HITL Approvals required:</span>
                                <lightning-badge label={card.hitl} class="hg-dash-badge"></lightning-badge>
                            </div>
                        </article>
                    </template>
                </div>

                <!-- ═══ TOP QUALITY ISSUES — Figma 387:48080 ═══ -->
                <section class="hg-qi-section">
                    <div class="hg-qi-header">
                        <h2 class="hg-qi-header__title">Top Quality Issues</h2>
                        <button type="button" class="hg-qi-header__explore" onclick={handleExploreAll}>
                            Explore All
                            <lightning-icon icon-name="utility:forward" size="xx-small" alternative-text="" class="hg-qi-header__explore-icon"></lightning-icon>
                        </button>
                    </div>

                    <template lwc:if={hasTopQualityIssues}>
                        <template for:each={topQualityIssues} for:item="q">
                            <article key={q.id} class="hg-qi-tile">
                                <div class="hg-qi-tile__head">
                                    <div class="hg-qi-tile__head-left">
                                        <span class="hg-qi-tile__domain">{q.domain}</span>
                                        <lightning-badge label={q.typeBadgeLabel} class="hg-qi-type-badge slds-badge_lightest"></lightning-badge>
                                        <lightning-badge label={q.confidenceLabel} icon-name="utility:success" class="hg-qi-conf-badge slds-theme_success"></lightning-badge>
                                    </div>
                                    <div class="hg-qi-tile__head-actions">
                                        <template lwc:if={q.isSimilarity}>
                                            <lightning-button variant="brand" label="Merge Articles" data-title={q.title} onclick={handleMergeArticles}></lightning-button>
                                        </template>
                                        <lightning-button variant="brand-outline" label="Ignore Issue" data-id={q.id} onclick={handleIgnoreIssue}></lightning-button>
                                    </div>
                                </div>

                                <div class="hg-qi-tile__summary">
                                    <p class="hg-qi-tile__summary-title">{q.title}</p>
                                    <p class="hg-qi-tile__summary-text">{q.description}</p>
                                </div>

                                <div class="hg-qi-tile__columns">
                                    <div class="hg-qi-col">
                                        <span class="hg-qi-col__label">{q.itemALabel}</span>
                                        <button type="button" class="hg-qi-col__article" data-id={q.itemA.articleId} data-title={q.itemA.articleTitle} onclick={handleOpenArticle}>
                                            <lightning-icon icon-name="utility:knowledge_base" size="xx-small" alternative-text="" class="hg-qi-col__article-icon"></lightning-icon>
                                            <span class="hg-qi-col__article-text">{q.itemA.articleTitle}</span>
                                        </button>
                                        <p class="hg-qi-col__text">{q.itemA.text}</p>
                                        <div class="hg-qi-col__footer">
                                            <template lwc:if={q.isContradiction}>
                                                <lightning-button variant="brand-outline" label="Pick this" data-title={q.itemA.articleTitle} onclick={handlePickOption}></lightning-button>
                                            </template>
                                            <template lwc:else>
                                                <lightning-button variant="brand-outline" label="Archive Article" data-id={q.id} onclick={handleArchiveArticle}></lightning-button>
                                            </template>
                                        </div>
                                    </div>

                                    <div class="hg-qi-col">
                                        <span class="hg-qi-col__label">{q.itemBLabel}</span>
                                        <button type="button" class="hg-qi-col__article" data-id={q.itemB.articleId} data-title={q.itemB.articleTitle} onclick={handleOpenArticle}>
                                            <lightning-icon icon-name="utility:knowledge_base" size="xx-small" alternative-text="" class="hg-qi-col__article-icon"></lightning-icon>
                                            <span class="hg-qi-col__article-text">{q.itemB.articleTitle}</span>
                                        </button>
                                        <p class="hg-qi-col__text">{q.itemB.text}</p>
                                        <div class="hg-qi-col__footer">
                                            <template lwc:if={q.isContradiction}>
                                                <lightning-button variant="brand-outline" label="Pick this" data-title={q.itemB.articleTitle} onclick={handlePickOption}></lightning-button>
                                            </template>
                                            <template lwc:else>
                                                <lightning-button variant="brand-outline" label="Archive Article" data-id={q.id} onclick={handleArchiveArticle}></lightning-button>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </template>
                    <template lwc:else>
                        <div class="hg-contra-empty">
                            <lightning-icon icon-name="utility:success" size="small" alternative-text="" class="hg-contra-empty__icon"></lightning-icon>
                            <p class="hg-contra-empty__text">No active quality issues right now.</p>
                        </div>
                    </template>
                </section>

                <!-- ═══ SELF-HEALED QUALITY ISSUE — Figma 402:50197 ═══ -->
                <section class="hg-shi-section">
                    <div class="hg-shi-header">
                        <h2 class="hg-shi-header__title">Self-Healed Quality Issue</h2>
                        <div class="hg-shi-header__actions">
                            <lightning-button-icon
                                class={healedFilterBtnClass}
                                icon-name="utility:filterList"
                                variant="border-filled"
                                size="small"
                                alternative-text="Filter to items in review"
                                title="Filter to items in review"
                                onclick={handleFilterHealed}
                            ></lightning-button-icon>
                            <lightning-button-icon
                                class="hg-shi-iconbtn"
                                icon-name="utility:refresh"
                                variant="border-filled"
                                size="small"
                                alternative-text="Refresh"
                                title="Refresh"
                                onclick={handleRefreshHealed}
                            ></lightning-button-icon>
                        </div>
                    </div>

                    <div class="hg-shi-grid" role="table" aria-label="Self-healed quality issues">
                        <!-- Header row -->
                        <div class="hg-shi-grid__head" role="row">
                            <span class="hg-shi-headcell hg-shi-headcell--check" role="columnheader" aria-label="Select"></span>
                            <span class="hg-shi-headcell" role="columnheader">Article Updated/Drafted</span>
                            <span class="hg-shi-headcell" role="columnheader">Issue Type</span>
                            <span class="hg-shi-headcell" role="columnheader">Status</span>
                            <span class="hg-shi-headcell" role="columnheader">Domain/Agent</span>
                            <span class="hg-shi-headcell hg-shi-headcell--menu" role="columnheader" aria-label="Actions"></span>
                        </div>

                        <template lwc:if={hasSelfHealed}>
                            <template for:each={selfHealedRows} for:item="row">
                                <div key={row.id} class="hg-shi-rowgroup">
                                    <div class={row.rowClass} role="row">
                                        <span class="hg-shi-cell hg-shi-cell--check" role="cell">
                                            <lightning-input
                                                type="checkbox"
                                                variant="label-hidden"
                                                label="Select row"
                                                checked={row.selected}
                                                data-id={row.id}
                                                onchange={handleHealedSelect}
                                            ></lightning-input>
                                        </span>
                                        <span class="hg-shi-cell hg-shi-cell--article" role="cell">
                                            <button
                                                type="button"
                                                class="hg-shi-chevron"
                                                data-id={row.id}
                                                aria-expanded={row.isExpanded}
                                                aria-label="Toggle resolution details"
                                                onclick={handleToggleHealedRow}
                                            >
                                                <lightning-icon icon-name={row.chevronIcon} size="xx-small" alternative-text=""></lightning-icon>
                                            </button>
                                            <button
                                                type="button"
                                                class="hg-shi-link"
                                                data-id={row.articleId}
                                                data-title={row.articleTitle}
                                                onclick={handleHealedArticleClick}
                                            >{row.articleTitle}</button>
                                        </span>
                                        <span class="hg-shi-cell" role="cell">{row.issueType}</span>
                                        <span class="hg-shi-cell hg-shi-cell--status" role="cell">
                                            <lightning-badge label={row.status} class={row.statusBadgeClass}></lightning-badge>
                                        </span>
                                        <span class="hg-shi-cell" role="cell">{row.domain}</span>
                                        <span class="hg-shi-cell hg-shi-cell--menu" role="cell">
                                            <lightning-button-menu
                                                icon-name="utility:down"
                                                icon-size="x-small"
                                                variant="border-filled"
                                                menu-alignment="right"
                                                alternative-text="Row actions"
                                                data-id={row.id}
                                                onselect={handleHealedRowAction}
                                            >
                                                <lightning-menu-item value="view-article" label="Open Article"></lightning-menu-item>
                                                <lightning-menu-item value="dismiss" label="Dismiss"></lightning-menu-item>
                                            </lightning-button-menu>
                                        </span>
                                    </div>

                                    <template lwc:if={row.isExpanded}>
                                        <div class="hg-shi-detail">
                                            <div class="hg-shi-panel hg-shi-panel--issue">
                                                <p class="hg-shi-panel__title">{row.issueTitle}</p>
                                                <p class="hg-shi-panel__text">{row.issueText}</p>
                                            </div>
                                            <div class="hg-shi-panel hg-shi-panel--resolution">
                                                <p class="hg-shi-panel__title">{row.resolution.title}</p>
                                                <p class="hg-shi-panel__text">
                                                    <template for:each={row.resolutionParts} for:item="part">
                                                        <template lwc:if={part.isText}>
                                                            <span key={part.key}>{part.text}</span>
                                                        </template>
                                                        <template lwc:if={part.isLink}>
                                                            <button
                                                                key={part.key}
                                                                type="button"
                                                                class="hg-shi-reslink"
                                                                data-id={part.id}
                                                                data-title={part.title}
                                                                onclick={handleHealedArticleClick}
                                                            >
                                                                <lightning-icon icon-name="utility:knowledge_base" size="xx-small" alternative-text="" class="hg-shi-reslink__icon"></lightning-icon>
                                                                <span class="hg-shi-reslink__text">{part.title}</span>
                                                            </button>
                                                        </template>
                                                    </template>
                                                </p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </template>
                        <template lwc:else>
                            <div class="hg-shi-empty">
                                <lightning-icon icon-name="utility:success" size="small" alternative-text="" class="hg-shi-empty__icon"></lightning-icon>
                                <p class="hg-shi-empty__text">No self-healed issues to show.</p>
                            </div>
                        </template>
                    </div>
                </section>
            </div>
        </template>
        </div>
    </div>
</template>
