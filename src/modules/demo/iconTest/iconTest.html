<template>
    <div class="page">

        <!-- Page header -->
        <div class="page-header">
            <div class="page-header__back">
                <lightning-button-icon
                    icon-name="utility:back"
                    alternative-text="Back to main"
                    title="Back to main"
                    onclick={handleBack}>
                </lightning-button-icon>
            </div>
            <div class="page-header__title">
                <span class="slds-text-heading_large">Icon Test Page</span>
                <span class="slds-text-body_regular slds-m-left_small page-header__subtitle">
                    {totalCount} icons &nbsp;&middot;&nbsp; render time: {renderTimeLabel}
                </span>
            </div>
        </div>

        <div class="page-body">

            <!-- Standard Icons -->
            <div class="icon-section">
                <div class="icon-section__header">
                    <span class="slds-text-heading_small">Standard</span>
                    <span class="slds-badge slds-m-left_x-small">{standardCount}</span>
                </div>
                <div class="icon-grid">
                    <template for:each={standardIcons} for:item="icon">
                        <div key={icon.name} class="icon-item">
                            <lightning-icon icon-name={icon.name} size="small"></lightning-icon>
                            <span class="icon-item__label">{icon.label}</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Utility Icons -->
            <div class="icon-section">
                <div class="icon-section__header">
                    <span class="slds-text-heading_small">Utility</span>
                    <span class="slds-badge slds-m-left_x-small">{utilityCount}</span>
                </div>
                <div class="icon-grid">
                    <template for:each={utilityIcons} for:item="icon">
                        <div key={icon.name} class="icon-item">
                            <lightning-icon icon-name={icon.name} size="small"></lightning-icon>
                            <span class="icon-item__label">{icon.label}</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Doctype Icons -->
            <div class="icon-section">
                <div class="icon-section__header">
                    <span class="slds-text-heading_small">Doctype</span>
                    <span class="slds-badge slds-m-left_x-small">{doctypeCount}</span>
                </div>
                <div class="icon-grid">
                    <template for:each={doctypeIcons} for:item="icon">
                        <div key={icon.name} class="icon-item">
                            <lightning-icon icon-name={icon.name} size="small"></lightning-icon>
                            <span class="icon-item__label">{icon.label}</span>
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>
</template>
