<template>
  <div class="app-container">
    <!-- Prototype switcher card (fixed top-right) -->
    <div class="prototype-switcher" role="complementary" aria-label="Prototype switcher">
      <span class="ps-label">Prototype Setting</span>
      <div class="ps-input" onclick={handleTogglePrototypeDropdown} role="button" aria-haspopup="listbox" aria-expanded={prototypeDropdownOpen}>
        <span class="ps-input__value">{selectedFlowLabel}</span>
        <svg class="ps-input__chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" aria-hidden="true">
          <path d="M47.6 17.8L27.1 38.5c-.6.6-1.6.6-2.2 0L4.4 17.8c-.6-.6-.6-1.6 0-2.2l2.2-2.2c.6-.6 1.6-.6 2.2 0L26 30.2l17.2-16.8c.6-.6 1.6-.6 2.2 0l2.2 2.2c.6.6.6 1.5 0 2.2z"/>
        </svg>
      </div>
      <template lwc:if={prototypeDropdownOpen}>
        <div class="ps-dropdown" role="listbox" aria-label="Prototype Setting options">
          <template for:each={prototypeOptions} for:item="opt">
            <div
              key={opt.value}
              class={opt.optionClass}
              data-value={opt.value}
              role="option"
              aria-selected={opt.isSelected}
              onclick={handleFlowSelect}
            >{opt.label}</div>
          </template>
        </div>
      </template>
    </div>

    <!-- SF Global Header -->
    <header class="sf-global-header">
      <div class="sf-global-header__inner">
        <div class="sf-global-header__logo">
          <lightning-icon icon-name="standard:knowledge" size="small" alternative-text="Salesforce"></lightning-icon>
        </div>
        <div class="sf-global-header__search">
          <lightning-input type="search" variant="label-hidden" placeholder="Search..." class="sf-search"></lightning-input>
        </div>
        <div class="sf-global-header__actions">
          <lightning-icon icon-name="utility:smiley_and_people" size="small" alternative-text="People"></lightning-icon>
          <lightning-icon icon-name="utility:favorite" size="small" alternative-text="Favorites"></lightning-icon>
          <lightning-icon icon-name="utility:add" size="small" alternative-text="Add"></lightning-icon>
          <lightning-icon icon-name="utility:notification" size="small" alternative-text="Notifications"></lightning-icon>
          <lightning-icon icon-name="utility:question_mark" size="small" alternative-text="Help"></lightning-icon>
          <lightning-icon icon-name="utility:setup" size="small" alternative-text="Setup"></lightning-icon>
          <div class="sf-avatar"></div>
        </div>
      </div>
    </header>

    <!-- App Nav Bar -->
    <nav class="sf-app-nav">
      <div class="sf-app-nav__inner">
        <div class="sf-app-nav__app">
          <lightning-icon icon-name="utility:apps" size="x-small" alternative-text="Apps"></lightning-icon>
          <span class="sf-app-nav__app-name">Q Branch</span>
        </div>
        <ul class="sf-app-nav__tabs">
          <li class="sf-app-nav__tab">Q Home</li>
          <li class="sf-app-nav__tab">Demo Wizard</li>
          <li class="sf-app-nav__tab">Demo Tools</li>
          <li class="sf-app-nav__tab">Demo Components</li>
          <li class="sf-app-nav__tab sf-app-nav__tab--active">
            <lightning-icon icon-name="utility:knowledge_smart_link" size="xx-small" alternative-text="Knowledge"></lightning-icon>
            <span class="sf-app-nav__tab-label">Frequently asked questions about...</span>
            <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Close tab"></lightning-icon>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="sf-page-content">
      <page-knowledge-article></page-knowledge-article>
    </main>
  </div>
</template>
