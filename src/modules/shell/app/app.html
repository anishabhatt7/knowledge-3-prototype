<template>
  <div class="app-container">
    <header class="slds-global-header_container">
      <div class="slds-global-header slds-grid slds-grid_align-spread">
        <div class="slds-global-header__item">
          <div class="slds-text-heading_medium">AI Ready Knowledge Prototype</div>
        </div>
      </div>
    </header>

    <div class="slds-tabs_default">
      <ul class="slds-tabs_default__nav" role="tablist">
        <li
          class={analyzerTabClass}
          title="Article Analyzer"
          role="presentation"
          onclick={handleTabClick}
          data-tab="articleAnalyzer"
        >
          <a class="slds-tabs_default__link" role="tab" tabindex="0" aria-selected={isAnalyzerActive}>
            Article Analyzer
          </a>
        </li>
        <li
          class={authorTabClass}
          title="Guided Author"
          role="presentation"
          onclick={handleTabClick}
          data-tab="guidedAuthor"
        >
          <a class="slds-tabs_default__link" role="tab" tabindex="-1" aria-selected={isAuthorActive}>
            Guided Author
          </a>
        </li>
        <li
          class={metadataTabClass}
          title="Metadata Suggester"
          role="presentation"
          onclick={handleTabClick}
          data-tab="metadataSuggester"
        >
          <a class="slds-tabs_default__link" role="tab" tabindex="-1" aria-selected={isMetadataActive}>
            Metadata
          </a>
        </li>
        <li
          class={enrichmentTabClass}
          title="Enrichment Preview"
          role="presentation"
          onclick={handleTabClick}
          data-tab="enrichmentPreview"
        >
          <a class="slds-tabs_default__link" role="tab" tabindex="-1" aria-selected={isEnrichmentActive}>
            Enrichment
          </a>
        </li>
        <li
          class={dashboardTabClass}
          title="Health Dashboard"
          role="presentation"
          onclick={handleTabClick}
          data-tab="healthDashboard"
        >
          <a class="slds-tabs_default__link" role="tab" tabindex="-1" aria-selected={isDashboardActive}>
            Dashboard
          </a>
        </li>
      </ul>

      <div class="slds-tabs_default__content" role="tabpanel">
        <template if:true={isAnalyzerActive}>
          <page-article-analyzer onnavigate={handleNavigate}></page-article-analyzer>
        </template>
        <template if:true={isAuthorActive}>
          <div class="slds-text-heading_medium slds-p-around_medium">Guided Author - Coming Soon</div>
        </template>
        <template if:true={isMetadataActive}>
          <div class="slds-text-heading_medium slds-p-around_medium">Metadata Suggester - Coming Soon</div>
        </template>
        <template if:true={isEnrichmentActive}>
          <div class="slds-text-heading_medium slds-p-around_medium">Enrichment Preview - Coming Soon</div>
        </template>
        <template if:true={isDashboardActive}>
          <div class="slds-text-heading_medium slds-p-around_medium">Health Dashboard - Coming Soon</div>
        </template>
      </div>
    </div>
  </div>
</template>
