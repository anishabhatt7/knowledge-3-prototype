<template>
    <div class="slds-context-bar">
        <div class="slds-context-bar__primary">
            <div
                class={waffleDropdownTriggerClass}
                role="presentation">
                <div class="slds-context-bar__icon-action">
                    <main-waffle
                        title="Open App Launcher"
                        assistive-text="Open App Launcher"
                        onopen={handleWaffleOpen}>
                    </main-waffle>
                </div>
                <div
                    class="slds-dropdown slds-dropdown_left"
                    role="menu"
                    aria-label="App Launcher"
                    if:true={isWaffleMenuOpen}
                    onkeydown={handleWaffleMenuKeydown}>
                    <ul class="slds-dropdown__list" role="group">
                        <li class="slds-dropdown__item" role="presentation">
                            <a href="/" role="menuitem" tabindex="-1" data-value="home" onclick={handleWaffleMenuItemClick}>Home</a>
                        </li>
                        <li class="slds-dropdown__item" role="presentation">
                            <a href="/icons" role="menuitem" tabindex="-1" data-value="icons" onclick={handleWaffleMenuItemClick}>Icons</a>
                        </li>
                        <li class="slds-dropdown__item" role="presentation">
                            <a href="/settings" role="menuitem" tabindex="-1" data-value="settings" onclick={handleWaffleMenuItemClick}>Settings</a>
                        </li>
                        <li class="slds-dropdown__item" role="presentation">
                            <a href="/users/42" role="menuitem" tabindex="-1" data-value="user" onclick={handleWaffleMenuItemClick}>User 42</a>
                        </li>
                    </ul>
                </div>
                <span class="slds-context-bar__label-action slds-context-bar__app-name">
                    <span class="slds-truncate" title="Salesforce UI Starter Kit">Salesforce UI Starter Kit</span>
                </span>
            </div>
        </div>
        <nav class="slds-context-bar__secondary" role="navigation" aria-label="App navigation">
            <ul class="slds-grid slds-container_fluid">
                <li class={homeTabClass}>
                    <a href="/" class="slds-context-bar__label-action" title="Home" onclick={handleHomeClick}>
                        <span class="slds-assistive-text" if:true={isHomePage}>Current Page:</span>
                        <span class="slds-truncate" title="Home">Home</span>
                    </a>
                </li>
                <li class={iconsTabClass}>
                    <a href="/icons" class="slds-context-bar__label-action" title="Icons" onclick={handleIconsClick}>
                        <span class="slds-assistive-text" if:true={isIconsPage}>Current Page:</span>
                        <span class="slds-truncate" title="Icons">Icons</span>
                    </a>
                </li>
                <li class={settingsTabClass}>
                    <a href="/settings" class="slds-context-bar__label-action" title="Settings" onclick={handleSettingsClick}>
                        <span class="slds-assistive-text" if:true={isSettingsPage}>Current Page:</span>
                        <span class="slds-truncate" title="Settings">Settings</span>
                    </a>
                </li>
                <li class={userTabClass}>
                    <a href="/users/42" class="slds-context-bar__label-action" title="User 42" onclick={handleUserClick}>
                        <span class="slds-assistive-text" if:true={isUserPage}>Current Page:</span>
                        <span class="slds-truncate" title="User 42">User 42</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</template>
