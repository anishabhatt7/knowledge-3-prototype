<template lwc:render-mode="light">
    <aside class={panelClass}>
        <nav class="ka-rail" aria-label="Knowledge Assist views">
            <template for:each={railTabs} for:item="tab">
                <button
                    key={tab.id}
                    class={tab.btnClass}
                    data-id={tab.id}
                    type="button"
                    title={tab.ariaLabel}
                    aria-label={tab.ariaLabel}
                    onclick={handleRailClick}>
                    <lightning-icon icon-name={tab.icon} size="x-small" alternative-text={tab.ariaLabel}></lightning-icon>
                </button>
            </template>
        </nav>

        <div class="ka-card">
            <header class="ka-card__header">
                <h2 class="ka-card__title">Knowledge Assist</h2>
                <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare"
                    size="small"
                    alternative-text="Close Knowledge Assist"
                    onclick={handleClose}>
                </lightning-button-icon>
            </header>

            <template lwc:if={isMetricsTab}>
                <section class="ka-section">
                    <h3 class="ka-section__title">Article Health Score</h3>

                    <div class="ka-score">
                        <div class="ka-score__ring" style={progressStyle}>
                            <span class="ka-score__inner">{scoreLabel}</span>
                        </div>
                        <div class="ka-score__meta">
                            <div class="ka-score__block">
                                <div class="ka-score__value">{casesAvertedLabel}</div>
                                <div class="ka-score__caption">Potential Cases to be averted</div>
                            </div>
                            <div class="ka-score__block">
                                <div class="ka-score__value ka-score__value_delta">{deltaLabel}</div>
                                <div class="ka-score__caption">Increase in coverage score</div>
                            </div>
                        </div>
                    </div>

                    <div class="ka-reason">
                        <div class="ka-reason__row">
                            <span class="ka-reason__label">Contact Reason:</span>
                            <span class="ka-chip ka-chip_standard">
                                <lightning-icon icon-name="standard:contact_list" size="xx-small"></lightning-icon>
                                <span class="ka-chip__text">{contactReasonLabel}</span>
                                <lightning-button-icon
                                    icon-name="utility:chevrondown"
                                    variant="bare"
                                    size="xx-small"
                                    alternative-text="Change contact reason">
                                </lightning-button-icon>
                            </span>
                        </div>
                        <p class="ka-reason__note">{reasonNote}</p>
                    </div>
                </section>

                <hr class="ka-divider" />

                <section class="ka-section ka-section_suggests">
                    <div class="ka-suggests__heading">
                        <h3 class="ka-section__title">Smart Suggests</h3>
                        <lightning-button
                            variant="brand-outline"
                            icon-name="utility:sparkles"
                            label="Update All"
                            title="Update All"
                            onclick={handleUpdateAll}>
                        </lightning-button>
                    </div>

                    <template for:each={suggestCards} for:item="s">
                        <article key={s.id} class="ka-suggest">
                            <header class="ka-suggest__head">
                                <lightning-icon
                                    icon-name={s.icon}
                                    size="x-small"
                                    class="ka-suggest__icon">
                                </lightning-icon>
                                <h4 class="ka-suggest__title">{s.label}</h4>
                                <template lwc:if={s.showBadge}>
                                    <lightning-badge label={s.badge} class="ka-badge-best slds-theme_success"></lightning-badge>
                                </template>
                            </header>
                            <p class="ka-suggest__desc">{s.description}</p>
                            <template lwc:if={s.isUpdated}>
                                <div class="ka-suggest__status">
                                    <lightning-badge
                                        label="Updated"
                                        icon-name="utility:check"
                                        class="slds-badge_inverse ka-badge-updated">
                                    </lightning-badge>
                                </div>
                            </template>
                            <template lwc:else>
                                <div class="ka-suggest__metrics">
                                    <div class="ka-metric">
                                        <span class="ka-metric__value">{s.coverageLabel}</span>
                                        <span class="ka-metric__label">Increase in Coverage</span>
                                    </div>
                                    <div class="ka-metric">
                                        <span class="ka-metric__value">{s.confidenceLabel}</span>
                                        <span class="ka-metric__label">AI confidence</span>
                                    </div>
                                </div>
                                <div class="ka-suggest__actions">
                                    <lightning-button
                                        variant="brand-outline"
                                        icon-name="utility:sparkles"
                                        label="Add Block"
                                        title="Add Block"
                                        data-id={s.id}
                                        onclick={handleApply}>
                                    </lightning-button>
                                </div>
                            </template>
                        </article>
                    </template>
                </section>
            </template>

            <template lwc:elseif={isSourcesTab}>
                <section class="ka-section ka-section_sources">
                    <div class="ka-sources__header">
                        <h3 class="ka-section__title">Knowledge Blocks</h3>
                        <span class="ka-sources__count">{blockCountLabel}</span>
                    </div>
                    <p class="ka-sources__desc">Search and insert reusable knowledge blocks into this article.</p>
                    <div class="ka-sources__search">
                        <lightning-icon icon-name="utility:search" size="xx-small" class="ka-sources__search-icon"></lightning-icon>
                        <input type="text"
                            class="ka-sources__search-input"
                            placeholder="Search by title or description..."
                            value={_blockSearch}
                            oninput={handleBlockSearch}
                            onkeydown={handleBlockSearchKeyDown} />
                    </div>
                    <div class="ka-sources__list">
                        <template for:each={filteredBlocks} for:item="kb">
                            <div key={kb.syncGroupId} class="ka-kb-card">
                                <div class="ka-kb-card__head">
                                    <span class="ka-kb-card__title">{kb.title}</span>
                                    <template lwc:if={kb.isSuggested}>
                                        <lightning-badge label="Suggested" icon-name="utility:success" class="slds-theme_success"></lightning-badge>
                                    </template>
                                </div>
                                <p class="ka-kb-card__desc">{kb.description}</p>
                                <template lwc:if={kb.isInserted}>
                                    <lightning-badge label="Block Inserted" icon-name="utility:check" icon-position="start" class="slds-badge_inverse ka-badge-inserted"></lightning-badge>
                                </template>
                                <template lwc:else>
                                    <lightning-button
                                        variant="brand-outline"
                                        icon-name="utility:sparkles"
                                        label="Insert Block"
                                        data-id={kb.syncGroupId}
                                        onclick={handleInsertBlockClick}>
                                    </lightning-button>
                                </template>
                            </div>
                        </template>
                        <template lwc:if={noBlockResults}>
                            <div class="ka-sources__empty">
                                <p>No blocks match your search.</p>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <template lwc:elseif={isTocTab}>
                <section class="ka-section ka-section_toc" aria-labelledby="ka-toc-heading">
                    <h3 id="ka-toc-heading" class="ka-section__title ka-toc__heading">Table of Contents</h3>
                    <div class="ka-toc__search">
                        <lightning-icon icon-name="utility:search" size="xx-small" class="ka-toc__search-icon"></lightning-icon>
                        <input type="text"
                            class="ka-toc__search-input"
                            placeholder="Search the knowledge base..."
                            aria-label="Search table of contents"
                            value={_tocSearch}
                            oninput={handleTocSearch} />
                    </div>
                    <ul class="ka-toc__list" role="tree">
                        <template for:each={flattenedToc} for:item="row">
                            <li key={row.id} class="ka-toc__item" role="treeitem" aria-selected={row.isSelected} aria-expanded={row.ariaExpanded}>
                                <button type="button"
                                    class={row.rowClass}
                                    data-id={row.id}
                                    data-has-children={row.hasChildren}
                                    title={row.title}
                                    onclick={handleTocRowClick}>
                                    <span class="ka-toc__chevron">
                                        <template lwc:if={row.chevronIcon}>
                                            <lightning-icon
                                                icon-name={row.chevronIcon}
                                                size="xx-small"
                                                alternative-text=""
                                                class="ka-toc__chevron-icon">
                                            </lightning-icon>
                                        </template>
                                    </span>
                                    <span class="ka-toc__label">{row.title}</span>
                                </button>
                            </li>
                        </template>
                        <template lwc:if={noTocResults}>
                            <li class="ka-toc__empty">
                                <p>No articles match your search.</p>
                            </li>
                        </template>
                    </ul>
                </section>
            </template>

            <template lwc:else>
                <div class="ka-empty">
                    <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                    <p>Select a tab on the rail to get started.</p>
                </div>
            </template>
        </div>
    </aside>
</template>
